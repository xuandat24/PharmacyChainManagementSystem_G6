<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Phê duyệt Yêu cầu nhập hàng - Pharmacy Chain</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        .sidebar { min-height: 100vh; background-color: #212529; }
        .sidebar a { color: #dee2e6; text-decoration: none; }
        .sidebar a:hover { background-color: #495057; color: white !important; }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <div th:replace="~{layout/sidebar :: sidebar('purchase')}"></div>

        <!-- Main Content -->
        <div class="col-md-10 bg-light p-4">
            <div class="pb-3 mb-4 border-bottom">
                <h2 class="text-secondary fw-bold">Phê duyệt Yêu cầu nhập hàng: <span th:text="'PR-' + ${pr.requestId}">PR-001</span></h2>
                <p class="text-muted">Chi nhánh đề xuất: <strong th:text="${pr.branch.branchName}">Branch A</strong> | Người tạo: <span th:text="${pr.createdBy.fullName}">Nguyen Van An</span></p>
            </div>

            <div class="card shadow-sm border-0 bg-white p-4">
                <form th:action="@{/purchase-requests/admin/approve/{id}(id=${pr.requestId})}" method="post">
                    <h5 class="fw-bold border-bottom pb-2 mb-3">Danh sách thuốc đề xuất</h5>
                    
                    <div class="table-responsive mb-4">
                        <table class="table table-bordered align-middle text-center">
                            <thead class="table-light">
                            <tr>
                                <th>Tên Thuốc</th>
                                <th>Đơn Giá Dự Kiến</th>
                                <th>Số Lượng Yêu Cầu</th>
                                <th style="width: 25%;">Số Lượng Phê Duyệt</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="d, stat : ${pr.details}">
                                <td class="text-start ps-3">
                                    <span th:text="${d.medicine.medicineName}">Panadol</span>
                                    <input type="hidden" name="detailIds" th:value="${d.requestDetailId}">
                                </td>
                                <td class="text-danger fw-bold" th:text="${#numbers.formatDecimal(d.estimatedPrice, 0, 'COMMA', 0, 'POINT') + ' đ'}">25,000 đ</td>
                                <td class="fw-semibold" th:text="${d.quantityRequested}">100</td>
                                <td>
                                    <input type="number" name="approvedQuantities" th:value="${d.quantityRequested}" class="form-control text-center" min="0" th:max="${d.quantityRequested}" required>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="mb-4">
                        <label for="adminNotes" class="form-label fw-bold">Ghi chú phê duyệt / từ chối</label>
                        <textarea id="adminNotes" name="adminNotes" class="form-control" rows="3" placeholder="Nhập lý do hoặc hướng dẫn thêm nếu có..."></textarea>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-success"><i class="fa-solid fa-check me-1"></i>Xác nhận Phê duyệt</button>
                        <button type="submit" th:formaction="@{/purchase-requests/admin/reject/{id}(id=${pr.requestId})}" class="btn btn-danger"><i class="fa-solid fa-xmark me-1"></i>Từ chối yêu cầu</button>
                        <a href="/purchase-requests" class="btn btn-secondary">Quay lại</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
