<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sửa Nhà cung cấp - Pharmacy Chain</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        .sidebar { min-height: 100vh; background-color: #212529; }
        .sidebar a { color: #dee2e6; text-decoration: none; }
        .sidebar a:hover { background-color: #495057; color: white !important; }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <div th:replace="~{layout/sidebar :: sidebar('supplier')}"></div>

        <!-- Main Content -->
        <div class="col-md-10 bg-light p-4">
            <div class="pb-3 mb-4 border-bottom">
                <h2 class="text-secondary fw-bold">Cập nhật thông tin Nhà cung cấp</h2>
            </div>

            <div class="card shadow-sm border-0 bg-white p-4" style="max-width: 600px;">
                <form th:action="@{/suppliers/update/{id}(id=${supplier.supplierId})}" th:object="${supplier}" method="post">
                    <div class="mb-3">
                        <label for="supplierName" class="form-label fw-bold">Tên Nhà Cung Cấp <span class="text-danger">*</span></label>
                        <input type="text" id="supplierName" th:field="*{supplierName}" class="form-control" required placeholder="Nhập tên nhà cung cấp">
                        <div class="text-danger" th:if="${#fields.hasErrors('supplierName')}" th:errors="*{supplierName}"></div>
                    </div>

                    <div class="mb-3">
                        <label for="phone" class="form-label fw-bold">Số Điện Thoại</label>
                        <input type="text" id="phone" th:field="*{phone}" class="form-control" placeholder="Nhập số điện thoại">
                    </div>

                    <div class="mb-3">
                        <label for="address" class="form-label fw-bold">Địa Chỉ</label>
                        <input type="text" id="address" th:field="*{address}" class="form-control" placeholder="Nhập địa chỉ nhà cung cấp">
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-warning text-white"><i class="fa-solid fa-floppy-disk me-1"></i>Cập nhật</button>
                        <a href="/suppliers" class="btn btn-secondary">Quay lại</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
