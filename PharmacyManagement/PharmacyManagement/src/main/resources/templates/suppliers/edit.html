<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sửa Nhà cung cấp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        .sidebar { min-height: 100vh; background-color: #212529; }
        .sidebar a { color: #dee2e6; text-decoration: none; }
        .sidebar a:hover { background-color: #495057; color: white !important; }
        .required-mark { color: #dc3545; }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <div th:replace="~{layout/sidebar :: sidebar('supplier')}"></div>

        <div class="col-md-10 bg-light p-4">
            <div class="pb-3 mb-4 border-bottom d-flex justify-content-between align-items-center">
                <h4 class="text-secondary fw-bold mb-0">
                    <i class="fa-solid fa-pen-to-square me-2"></i>Cập nhật Nhà cung cấp
                </h4>
                <a href="/suppliers" class="btn btn-outline-secondary btn-sm">
                    <i class="fa-solid fa-arrow-left me-1"></i>Quay lại
                </a>
            </div>

            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <div class="card shadow-sm border-0 bg-white p-4" style="max-width: 700px;">
                <form th:action="@{/suppliers/update/{id}(id=${supplier.supplierId})}"
                      th:object="${supplier}" method="post">

                    <div class="row g-3">

                        <!-- Mã nhà cung cấp - NOT NULL -->
                        <div class="col-md-6">
                            <label class="form-label fw-bold">
                                Mã nhà cung cấp <span class="required-mark">*</span>
                            </label>
                            <input type="text" th:field="*{supplierCode}" class="form-control" required
                                   th:classappend="${#fields.hasErrors('supplierCode')} ? 'is-invalid' : ''">
                            <div class="invalid-feedback" th:errors="*{supplierCode}"></div>
                        </div>

                        <!-- Tên nhà cung cấp - NOT NULL -->
                        <div class="col-md-6">
                            <label class="form-label fw-bold">
                                Tên nhà cung cấp <span class="required-mark">*</span>
                            </label>
                            <input type="text" th:field="*{supplierName}" class="form-control" required
                                   th:classappend="${#fields.hasErrors('supplierName')} ? 'is-invalid' : ''">
                            <div class="invalid-feedback" th:errors="*{supplierName}"></div>
                        </div>

                        <!-- Loại nhà cung cấp - NOT NULL -->
                        <div class="col-md-6">
                            <label class="form-label fw-bold">
                                Loại nhà cung cấp <span class="required-mark">*</span>
                            </label>
                            <select th:field="*{supplierType}" class="form-select" required
                                    th:classappend="${#fields.hasErrors('supplierType')} ? 'is-invalid' : ''">
                                <option value="">-- Chọn loại --</option>
                                <option value="MANUFACTURER">Nhà sản xuất (MANUFACTURER)</option>
                                <option value="DISTRIBUTOR">Nhà phân phối (DISTRIBUTOR)</option>
                                <option value="IMPORTER">Nhà nhập khẩu (IMPORTER)</option>
                                <option value="RETAILER">Bán lẻ (RETAILER)</option>
                            </select>
                            <div class="invalid-feedback" th:errors="*{supplierType}"></div>
                        </div>

                        <!-- Trạng thái -->
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Trạng thái</label>
                            <select th:field="*{status}" class="form-select">
                                <option value="DRAFT">Nháp (DRAFT)</option>
                                <option value="APPROVED">Đã duyệt (APPROVED)</option>
                                <option value="INACTIVE">Ngừng hoạt động (INACTIVE)</option>
                                <option value="SUSPENDED">Tạm dừng (SUSPENDED)</option>
                            </select>
                        </div>

                        <!-- Số điện thoại -->
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Số điện thoại</label>
                            <input type="text" th:field="*{phone}" class="form-control">
                        </div>

                        <!-- Email -->
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Email</label>
                            <input type="email" th:field="*{email}" class="form-control">
                        </div>

                        <!-- Mã số thuế -->
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Mã số thuế</label>
                            <input type="text" th:field="*{taxCode}" class="form-control">
                        </div>

                        <!-- Người liên hệ -->
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Người liên hệ</label>
                            <input type="text" th:field="*{contactPerson}" class="form-control">
                        </div>

                        <!-- Số giấy phép -->
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Số giấy phép kinh doanh</label>
                            <input type="text" th:field="*{licenseNo}" class="form-control">
                        </div>

                        <!-- Địa chỉ -->
                        <div class="col-12">
                            <label class="form-label fw-bold">Địa chỉ</label>
                            <input type="text" th:field="*{address}" class="form-control">
                        </div>

                    </div>

                    <hr class="my-4">
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-warning text-white">
                            <i class="fa-solid fa-floppy-disk me-1"></i>Cập nhật
                        </button>
                        <a href="/suppliers" class="btn btn-secondary">Hủy</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
