<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh sách Nhà cung cấp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        .sidebar { min-height: 100vh; background-color: #212529; }
        .sidebar a { color: #dee2e6; text-decoration: none; }
        .sidebar a:hover { background-color: #495057; color: white !important; }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <div th:replace="~{layout/sidebar :: sidebar('supplier')}"></div>
        <div class="col-md-10 bg-light p-4">

            <div class="d-flex justify-content-between align-items-center pb-3 mb-4 border-bottom">
                <h2 class="text-secondary fw-bold">Danh sách Nhà cung cấp</h2>
                <!-- Chỉ Admin/BranchManager mới thêm được -->
                <div th:if="${session.loggedInUser != null and (session.loggedInUser.role == 'Admin' or session.loggedInUser.role == 'BranchManager')}">
                    <a href="/suppliers/create" class="btn btn-success">
                        <i class="fa-solid fa-plus me-1"></i>Thêm nhà cung cấp
                    </a>
                </div>
            </div>

            <!-- Search -->
            <div class="card shadow-sm border-0 mb-4 bg-white">
                <div class="card-body">
                    <form th:action="@{/suppliers}" method="get" class="row g-3">
                        <div class="col-md-9">
                            <input type="text" name="search" th:value="${search}"
                                   class="form-control" placeholder="Tìm kiếm theo tên nhà cung cấp...">
                        </div>
                        <div class="col-md-3">
                            <button type="submit" class="btn btn-primary w-100">
                                <i class="fa-solid fa-magnifying-glass me-1"></i>Tìm kiếm
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="card shadow-sm border-0 bg-white">
                <div class="card-body p-0">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light text-center">
                        <tr>
                            <th>Mã NCC</th>
                            <th class="text-start ps-3">Tên Nhà Cung Cấp</th>
                            <th>Loại</th>
                            <th>Số Điện Thoại</th>
                            <th>Trạng Thái</th>
                            <th>Hành Động</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="supplier : ${suppliers}">
                            <!-- Hiển thị supplierCode thực thay vì 'NCC-id' -->
                            <td class="fw-bold text-primary text-center"
                                th:text="${supplier.supplierCode}"></td>
                            <td class="ps-3">
                                <div class="fw-semibold" th:text="${supplier.supplierName}"></div>
                                <div class="text-muted small" th:if="${supplier.contactPerson != null}"
                                     th:text="${supplier.contactPerson}"></div>
                            </td>
                            <td class="text-center">
                                <span class="badge bg-info text-dark"
                                      th:text="${supplier.supplierType}"></span>
                            </td>
                            <td class="text-center" th:text="${supplier.phone}"></td>
                            <td class="text-center">
                                <span class="badge"
                                      th:classappend="${supplier.status == 'APPROVED'} ? 'bg-success' : (${supplier.status == 'DRAFT'} ? 'bg-secondary' : (${supplier.status == 'SUSPENDED'} ? 'bg-warning text-dark' : 'bg-light text-dark border'))"
                                      th:text="${supplier.status}"></span>
                            </td>
                            <td class="text-center">
                                <!-- Chỉ Admin/BranchManager mới sửa/xóa -->
                                <div th:if="${session.loggedInUser != null and (session.loggedInUser.role == 'Admin' or session.loggedInUser.role == 'BranchManager')}">
                                    <a th:href="@{/suppliers/edit/{id}(id=${supplier.supplierId})}"
                                       class="btn btn-sm btn-outline-warning me-1">
                                        <i class="fa-solid fa-pen-to-square"></i>
                                    </a>
                                    <a th:href="@{/suppliers/delete/{id}(id=${supplier.supplierId})}"
                                       class="btn btn-sm btn-outline-danger"
                                       onclick="return confirm('Bạn có chắc chắn muốn xóa nhà cung cấp này?')">
                                        <i class="fa-solid fa-trash"></i>
                                    </a>
                                </div>
                                <!-- Pharmacist: chỉ xem -->
                                <span th:unless="${session.loggedInUser != null and (session.loggedInUser.role == 'Admin' or session.loggedInUser.role == 'BranchManager')}"
                                      class="text-muted small">Chỉ xem</span>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(suppliers)}">
                            <td colspan="6" class="text-muted py-4 text-center">
                                Không tìm thấy nhà cung cấp nào
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>
</div>
</body>
</html>
