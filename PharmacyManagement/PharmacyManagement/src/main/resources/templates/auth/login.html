<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập - Pharmacy Chain</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 300px; text-align: center; }
        .login-box input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; }
        .login-box button { width: 100%; padding: 10px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .login-box button:hover { background-color: #218838; }
        .error { color: red; font-size: 0.9em; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Đăng Nhập Hệ Thống</h2>

    <div th:if="${error}" class="error" th:text="${error}"></div>

    <form action="/login" method="post">
        <input type="text" name="username" placeholder="Tài khoản" required />
        <input type="password" name="password" placeholder="Mật khẩu" required />
        <button type="submit">Vào Hệ Thống</button>
    </form>
</div>

</body>
</html>
