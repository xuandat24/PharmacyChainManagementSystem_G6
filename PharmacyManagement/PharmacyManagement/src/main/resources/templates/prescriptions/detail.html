<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Chi tiết đơn thuốc</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">
    <div class="card shadow-sm border-0 mb-4">
        <div class="card-header bg-success text-white d-flex justify-content-between align-items-center">
            <h5 class="mb-0"><i class="fa-solid fa-prescription me-2"></i>
                Đơn thuốc #<span th:text="${prescription.prescriptionId}"></span>
                <small th:text="'(' + ${prescription.prescriptionCode} + ')'" class="opacity-75"></small>
            </h5>
            <span th:if="${prescription.valid}" class="badge bg-light text-success fs-6">Còn hiệu lực</span>
            <span th:unless="${prescription.valid}" class="badge bg-danger fs-6">Hết hạn</span>
        </div>
        <div class="card-body row">
            <div class="col-md-6">
                <p><strong>Khách hàng:</strong> <span th:text="${customer?.fullName}"></span></p>
                <p><strong>Bác sĩ:</strong> <span th:text="${prescription.doctorName}"></span></p>
                <p><strong>Cơ sở khám:</strong> <span th:text="${prescription.clinicName}"></span></p>
            </div>
            <div class="col-md-6">
                <p><strong>Ngày kê:</strong> <span th:text="${prescription.prescriptionDate}"></span></p>
                <p><strong>Hết hạn:</strong> <span th:text="${prescription.validUntil}"></span></p>
                <p th:if="${prescription.note != null}"><strong>Ghi chú:</strong> <span th:text="${prescription.note}"></span></p>
            </div>
        </div>
    </div>

    <!-- Danh sách thuốc trong đơn -->
    <div class="card shadow-sm border-0 mb-4">
        <div class="card-header bg-white fw-bold">Thuốc được kê</div>
        <div class="card-body p-0">
            <table class="table mb-0">
                <thead class="table-light">
                <tr><th>Mã thuốc</th><th>Số lượng kê</th><th>Hướng dẫn dùng</th></tr>
                </thead>
                <tbody>
                <tr th:each="d : ${details}">
                    <td th:text="${d.medicineId}"></td>
                    <td th:text="${d.prescribedQuantity}"></td>
                    <td th:text="${d.dosageInstruction}"></td>
                </tr>
                <tr th:if="${#lists.isEmpty(details)}">
                    <td colspan="3" class="text-center text-muted py-3">Chưa có thuốc nào</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Form thêm thuốc vào đơn -->
    <div class="card shadow-sm border-0 mb-3">
        <div class="card-header bg-white fw-bold">Thêm thuốc vào đơn</div>
        <div class="card-body">
            <form th:action="@{/prescriptions/{id}/add-medicine(id=${prescription.prescriptionId})}" method="post">
                <div class="row g-2 align-items-end">
                    <div class="col-md-3">
                        <label class="form-label small">Mã thuốc (medicine_id)</label>
                        <input type="number" name="medicineId" class="form-control" required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label small">Số lượng kê</label>
                        <input type="number" name="prescribedQuantity" class="form-control" required min="1">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label small">Hướng dẫn sử dụng</label>
                        <input type="text" name="dosageInstruction" class="form-control" placeholder="Uống sau ăn, 2 viên/lần...">
                    </div>
                    <div class="col-md-2">
                        <button type="submit" class="btn btn-success w-100">+ Thêm</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <a th:href="@{/prescriptions(customerId=${prescription.customerId})}" class="btn btn-secondary">
        <i class="fa-solid fa-arrow-left me-1"></i>Quay lại
    </a>
</div>
</body></html>
