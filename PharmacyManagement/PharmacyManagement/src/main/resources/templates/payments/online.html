<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Thanh toán Online</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4" style="max-width:460px">
    <div class="card shadow border-0">
        <div class="card-header bg-info text-white text-center">
            <h5 class="mb-0"><i class="fa-solid fa-qrcode me-2"></i>Thanh toán Chuyển khoản / QR</h5>
        </div>
        <div class="card-body text-center">
            <p class="text-muted mb-1">Số tiền cần thanh toán</p>
            <h2 class="text-success fw-bold mb-0"
                th:text="${#numbers.formatInteger(sale.finalAmount, 1, 'COMMA')} + ' đ'"></h2>
            <small class="text-muted">Hóa đơn #<span th:text="${sale.saleId}"></span></small>

            <!-- QR code - dùng API QR server để render mã -->
            <div class="border rounded p-4 bg-white my-4 d-inline-block">
                <img th:src="@{'https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=' + ${payment.note}}"
                     alt="QR Code" width="200" height="200">
            </div>

            <div class="alert alert-warning small mb-3">
                <i class="fa-solid fa-clock me-1"></i>
                Hệ thống tự động xác nhận khi nhận được thanh toán.<br>
                <strong>Pharmacist không được tự chuyển trạng thái PAID.</strong>
            </div>

            <div class="bg-light rounded p-2 mb-4 text-muted small">
                Mã tham chiếu: <code th:text="${payment.paymentCode}"></code>
            </div>

            <a href="/sales/cart" class="btn btn-outline-secondary">
                <i class="fa-solid fa-arrow-left me-1"></i>Quay lại
            </a>
        </div>
    </div>
</div>
</body></html>
