<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Hóa đơn</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>@media print { .no-print { display:none; } }</style>
</head>
<body class="bg-light">
<div class="container py-4" style="max-width:580px">
    <div th:if="${success}" class="alert alert-success no-print" th:text="${success}"></div>

    <div class="card shadow border-0">
        <div class="card-header bg-success text-white text-center py-3">
            <h5 class="mb-0"><i class="fa-solid fa-receipt me-2"></i>HÓA ĐƠN BÁN HÀNG</h5>
            <small class="opacity-75">Pharmacy Chain Management System</small>
        </div>
        <div class="card-body">
            <div class="row mb-3 text-muted small">
                <div class="col">
                    <strong>Mã HĐ:</strong> #<span th:text="${sale.saleId}"></span>
                    &nbsp;|&nbsp; <span class="text-muted" th:text="${sale.saleCode}"></span>
                </div>
                <div class="col text-end">
                    <strong>Ngày:</strong> <span th:text="${sale.saleDate}"></span>
                </div>
            </div>

            <table class="table table-sm table-bordered mb-3">
                <thead class="table-light">
                <tr><th>Thuốc</th><th class="text-center">SL</th>
                    <th class="text-end">Đơn giá</th><th class="text-end">Thành tiền</th></tr>
                </thead>
                <tbody>
                <tr th:each="d : ${details}">
                    <td th:text="'Thuốc #' + ${d.medicineId}"></td>
                    <td class="text-center" th:text="${d.quantity}"></td>
                    <td class="text-end"
                        th:text="${#numbers.formatInteger(d.unitPrice, 1, 'COMMA')} + ' đ'"></td>
                    <td class="text-end fw-bold"
                        th:text="${#numbers.formatInteger(d.lineAmount, 1, 'COMMA')} + ' đ'"></td>
                </tr>
                </tbody>
                <tfoot>
                <tr class="table-light">
                    <td colspan="3" class="text-end">Tổng tiền hàng</td>
                    <td class="text-end" th:text="${#numbers.formatInteger(sale.totalAmount, 1, 'COMMA')} + ' đ'"></td>
                </tr>
                <tr th:if="${sale.discountAmount > 0}">
                    <td colspan="3" class="text-end">Giảm giá</td>
                    <td class="text-end text-danger" th:text="'- ' + ${#numbers.formatInteger(sale.discountAmount, 1, 'COMMA')} + ' đ'"></td>
                </tr>
                <tr class="table-success">
                    <td colspan="3" class="text-end fw-bold">THÀNH TIỀN</td>
                    <td class="text-end fw-bold fs-5"
                        th:text="${#numbers.formatInteger(sale.finalAmount, 1, 'COMMA')} + ' đ'"></td>
                </tr>
                </tfoot>
            </table>

            <!-- Thông tin thanh toán -->
            <div th:if="${payment != null}" class="bg-light rounded p-3 mb-3 small">
                <div class="d-flex justify-content-between">
                    <span>Phương thức:</span>
                    <strong th:text="${payment.paymentMethod}"></strong>
                </div>
                <div class="d-flex justify-content-between" th:if="${payment.customerPaidAmount != null}">
                    <span>Tiền nhận:</span>
                    <span th:text="${#numbers.formatInteger(payment.customerPaidAmount, 1, 'COMMA')} + ' đ'"></span>
                </div>
                <div class="d-flex justify-content-between fw-bold" th:if="${payment.changeAmount != null}">
                    <span>Tiền thừa:</span>
                    <span class="text-primary"
                          th:text="${#numbers.formatInteger(payment.changeAmount, 1, 'COMMA')} + ' đ'"></span>
                </div>
            </div>

            <div class="text-center text-muted small">Cảm ơn quý khách! Chúc sức khỏe!</div>
        </div>
    </div>

    <div class="d-flex gap-2 mt-3 no-print">
        <button onclick="window.print()" class="btn btn-outline-secondary">
            <i class="fa-solid fa-print me-1"></i>In hóa đơn
        </button>
        <a href="/sales/cart" class="btn btn-primary"><i class="fa-solid fa-plus me-1"></i>Bán hàng mới</a>
        <a href="/sales" class="btn btn-outline-primary"><i class="fa-solid fa-list me-1"></i>Lịch sử</a>
    </div>
</div>
</body></html>
