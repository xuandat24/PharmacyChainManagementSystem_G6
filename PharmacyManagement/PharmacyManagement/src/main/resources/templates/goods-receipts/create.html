<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nhận hàng vào kho</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        .sidebar { min-height: 100vh; background-color: #212529; }
        .sidebar a { color: #dee2e6; text-decoration: none; }
        .sidebar a:hover { background-color: #495057; color: white !important; }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <div th:replace="~{layout/sidebar :: sidebar('receipt')}"></div>
        <div class="col-md-10 bg-light p-4">
            <div class="pb-3 mb-4 border-bottom">
                <!-- FIX: pr.requestId → pr.purchaseRequestId -->
                <h2 class="text-secondary fw-bold">Nhận hàng PR-<span th:text="${pr.purchaseRequestId}"></span></h2>
                <!-- FIX: pr.supplier.supplierName (lazy navigation) -->
                <p class="text-muted">Nhà cung cấp:
                    <strong th:text="${pr.supplier != null ? pr.supplier.supplierName : 'NCC-' + pr.supplierId}"></strong>
                </p>
            </div>
            <div class="card shadow-sm border-0 bg-white p-4">
                <form th:action="@{/goods-receipts/save}" th:object="${form}" method="post">
                    <input type="hidden" th:field="*{purchaseRequestId}">
                    <h5 class="fw-bold border-bottom pb-2 mb-3">Nhập thông tin thực tế nhận</h5>
                    <div class="table-responsive mb-4">
                        <table class="table table-bordered align-middle text-center">
                            <thead class="table-light">
                            <tr>
                                <th style="width:25%">Thuốc</th>
                                <th style="width:15%">Số Lô <span class="text-danger">*</span></th>
                                <th style="width:15%">Hạn Sử Dụng <span class="text-danger">*</span></th>
                                <th style="width:12%">Số Đặt</th>
                                <th style="width:15%">Số Thực Nhận <span class="text-danger">*</span></th>
                                <th style="width:18%">Giá Thực Mua (VNĐ) <span class="text-danger">*</span></th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="item, stat : ${form.items}">
                                <td class="text-start ps-3">
                                    <!-- FIX: pr.details[i].medicine.medicineName (lazy navigation) -->
                                    <span th:if="${pr.details[stat.index].medicine != null}"
                                          th:text="${pr.details[stat.index].medicine.medicineName}"></span>
                                    <span th:unless="${pr.details[stat.index].medicine != null}"
                                          th:text="'Thuốc ID: ' + ${pr.details[stat.index].medicineId}"></span>
                                    <input type="hidden" th:field="*{items[__${stat.index}__].medicineId}">
                                </td>
                                <td>
                                    <input type="text" th:field="*{items[__${stat.index}__].batchNumber}"
                                           class="form-control text-center" required placeholder="Lô">
                                </td>
                                <td>
                                    <input type="date" th:field="*{items[__${stat.index}__].expiryDate}"
                                           class="form-control" required>
                                </td>
                                <td>
                                    <!-- FIX: d.quantityApproved → d.approvedQuantity -->
                                    <span class="fw-semibold text-primary"
                                          th:text="${pr.details[stat.index].approvedQuantity}"></span>
                                </td>
                                <td>
                                    <!-- FIX: form field đúng là quantityReceived (GoodsReceiptForm.Item) -->
                                    <input type="number" th:field="*{items[__${stat.index}__].quantityReceived}"
                                           class="form-control text-center" min="0" required>
                                </td>
                                <td>
                                    <!-- FIX: purchasePrice là Integer → step="1", không dùng step="0.01" -->
                                    <input type="number" th:field="*{items[__${stat.index}__].purchasePrice}"
                                           class="form-control text-end" step="1" min="0" required>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-success">
                            <i class="fa-solid fa-square-check me-1"></i>Xác nhận & Đối chiếu
                        </button>
                        <a href="/purchase-requests" class="btn btn-secondary">Hủy bỏ</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
