<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Phiếu nhận hàng - Pharmacy Chain</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        .sidebar { min-height: 100vh; background-color: #212529; }
        .sidebar a { color: #dee2e6; text-decoration: none; }
        .sidebar a:hover { background-color: #495057; color: white !important; }
        .sidebar .active { background-color: #198754 !important; color: white !important; }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <div th:replace="~{layout/sidebar :: sidebar('receipt')}"></div>

        <!-- Main Content -->
        <div class="col-md-10 bg-light p-4">
            <div class="d-flex justify-content-between align-items-center pb-3 mb-4 border-bottom">
                <h2 class="text-secondary fw-bold">Danh sách Phiếu nhận hàng</h2>
                <div th:if="${user.role == 'Admin'}">
                    <a href="/goods-receipts/admin/pending" class="btn btn-warning text-white"><i class="fa-solid fa-bell me-1"></i>Phiếu chờ duyệt chênh lệch</a>
                </div>
            </div>

            <!-- List Table -->
            <div class="card shadow-sm border-0 bg-white">
                <div class="card-body p-0">
                    <table class="table table-hover align-middle mb-0 text-center">
                        <thead class="table-light">
                        <tr>
                            <th>Mã Phiếu Nhận</th>
                            <th>Mã Yêu Cầu (PR)</th>
                            <th>Ngày Nhận</th>
                            <th>Người Thực Hiện</th>
                            <th>Tổng Tiền</th>
                            <th>Trạng Thái</th>
                            <th>Hành Động</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="gr : ${receipts}">
                            <td class="fw-bold text-primary" th:text="'GR-' + ${gr.receiptId}">GR-001</td>
                            <td class="fw-bold" th:text="'PR-' + ${gr.purchaseRequest.requestId}">PR-001</td>
                            <td th:text="${#temporals.format(gr.receivedDate, 'dd-MM-yyyy HH:mm')}">23-06-2026 12:00</td>
                            <td th:text="${gr.receivedBy.fullName}">Nguyen Van An</td>
                            <td class="text-danger fw-bold" th:text="${#numbers.formatDecimal(gr.totalAmount, 0, 'COMMA', 0, 'POINT') + ' đ'}">1,800,000 đ</td>
                            <td>
                                <span th:if="${gr.status == 'DRAFT'}" class="badge bg-secondary-subtle text-secondary px-3 py-2 rounded-pill">Nháp</span>
                                <span th:if="${gr.status == 'PENDING_ADMIN_APPROVAL'}" class="badge bg-warning-subtle text-warning px-3 py-2 rounded-pill">Lệch - Chờ Admin duyệt</span>
                                <span th:if="${gr.status == 'POSTED'}" class="badge bg-success-subtle text-success px-3 py-2 rounded-pill">Đã nhập kho</span>
                                <span th:if="${gr.status == 'REJECTED'}" class="badge bg-danger-subtle text-danger px-3 py-2 rounded-pill">Bị từ chối</span>
                            </td>
                            <td>
                                <div th:if="${user.role == 'Admin' && gr.status == 'PENDING_ADMIN_APPROVAL'}">
                                    <a th:href="@{/goods-receipts/admin/approve-variance/{id}(id=${gr.receiptId})}" class="btn btn-sm btn-warning text-white"><i class="fa-solid fa-gavel me-1"></i>Xem xét chênh lệch</a>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(receipts)}">
                            <td colspan="7" class="text-muted py-4">Không có phiếu nhận hàng nào</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
