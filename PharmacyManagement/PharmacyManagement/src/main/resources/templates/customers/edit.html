<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Sửa khách hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4" style="max-width:650px">
    <div class="card shadow-sm border-0">
        <div class="card-header bg-warning text-dark"><h5 class="mb-0">Sửa thông tin Khách hàng</h5></div>
        <div class="card-body">
            <form th:action="@{/customers/edit/{id}(id=${customer.customerId})}" th:object="${customer}" method="post">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Họ và tên <span class="text-danger">*</span></label>
                    <input type="text" th:field="*{fullName}" class="form-control" required>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-semibold">Số điện thoại</label>
                        <input type="text" th:field="*{phone}" class="form-control">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-semibold">Ngày sinh</label>
                        <input type="date" th:field="*{dateOfBirth}" class="form-control">
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Giới tính</label>
                    <select th:field="*{gender}" class="form-select">
                        <option value="">-- Chọn --</option>
                        <option value="MALE">Nam</option>
                        <option value="FEMALE">Nữ</option>
                        <option value="OTHER">Khác</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Địa chỉ</label>
                    <input type="text" th:field="*{address}" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Ghi chú dị ứng</label>
                    <textarea th:field="*{allergyNote}" class="form-control" rows="2"></textarea>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-warning"><i class="fa-solid fa-save me-1"></i>Cập nhật</button>
                    <a href="/customers" class="btn btn-secondary">Hủy</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body></html>
