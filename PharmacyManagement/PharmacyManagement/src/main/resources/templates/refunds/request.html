<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><title>Yêu cầu hoàn tiền</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4" style="max-width:560px">

    <div class="d-flex align-items-center mb-3">
        <a href="/refunds" class="btn btn-outline-secondary btn-sm me-3">
            <i class="fa-solid fa-arrow-left"></i>
        </a>
        <h4 class="mb-0"><i class="fa-solid fa-rotate-left me-2 text-warning"></i>Yêu cầu hoàn tiền</h4>
    </div>

    <!-- Thông tin hóa đơn gốc -->
    <div th:if="${sale != null}" class="card border-0 shadow-sm mb-3">
        <div class="card-body">
            <div class="d-flex justify-content-between">
                <span class="text-muted">Mã hóa đơn:</span>
                <strong th:text="${sale.saleCode}"></strong>
            </div>
            <div class="d-flex justify-content-between">
                <span class="text-muted">Khách hàng:</span>
                <span th:text="${sale.customerName != null ? sale.customerName : 'Khách vãng lai'}"></span>
            </div>
            <div class="d-flex justify-content-between">
                <span class="text-muted">Ngày bán:</span>
                <span th:text="${#temporals.format(sale.saleDate,'dd/MM/yyyy HH:mm')}"></span>
            </div>
            <div class="d-flex justify-content-between fw-bold text-danger mt-1">
                <span>Số tiền hoàn:</span>
                <span th:text="${#numbers.formatInteger(sale.finalAmount, 1, 'COMMA')} + ' đ'"></span>
            </div>
        </div>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body">
            <form th:action="@{/refunds/create}" method="post" th:object="${refundDTO}">
                <input type="hidden" th:field="*{saleId}">

                <div class="mb-3">
                    <label class="form-label fw-semibold">Lý do hoàn tiền <span class="text-danger">*</span></label>
                    <textarea th:field="*{reason}" class="form-control"
                              th:classappend="${#fields.hasErrors('reason')} ? 'is-invalid'"
                              rows="4" placeholder="Nhập lý do hoàn tiền..."></textarea>
                    <div th:if="${#fields.hasErrors('reason')}" class="invalid-feedback"
                         th:errors="*{reason}"></div>
                </div>

                <div class="alert alert-warning small">
                    <i class="fa-solid fa-triangle-exclamation me-1"></i>
                    Yêu cầu sẽ được Branch Manager hoặc Admin xem xét.<br>
                    Hoàn tiền online hoặc số tiền lớn cần Admin phê duyệt.
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-warning">
                        <i class="fa-solid fa-paper-plane me-1"></i>Gửi yêu cầu hoàn tiền
                    </button>
                    <a href="/refunds" class="btn btn-outline-secondary">Hủy</a>
                </div>
            </form>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
