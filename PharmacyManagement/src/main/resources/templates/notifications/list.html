<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thông báo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/flow4.css}" rel="stylesheet">
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <div th:replace="~{layout/sidebar :: sidebar('notifications')}"></div>
        <div class="col-md-10 bg-light p-3">
<section class="panel">
            <div class="panel-header">
                <h2>Danh sách thông báo</h2>
                <button class="btn btn-light" id="reloadNotificationsBtn">Tải lại</button>
            </div>
            <div class="toolbar">
                <div class="form-group">
                    <label for="userId">User ID</label>
                    <input type="number" id="userId" min="1" placeholder="Tùy chọn">
                </div>
                <div class="form-group">
                    <label for="branchId">Branch ID</label>
                    <input type="number" id="branchId" min="1" placeholder="Tùy chọn">
                </div>
            </div>
            <div class="table-wrapper">
                <table>
                    <thead>
                    <tr>
                        <th>Thời gian</th>
                        <th>Loại</th>
                        <th>Tiêu đề</th>
                        <th>Nội dung</th>
                        <th>Trạng thái</th>
                        <th>Thao tác</th>
                    </tr>
                    </thead>
                    <tbody id="notificationBody">
                    <tr><td colspan="6" class="empty-state">Đang tải dữ liệu...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>
        </div>
    </div>
</div>
<div th:replace="~{fragments :: toast}"></div>
<div th:replace="~{fragments :: confirmModal}"></div>
<script th:src="@{/js/flow4/common.js}"></script>
<script th:src="@{/js/flow4/notifications.js}"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
