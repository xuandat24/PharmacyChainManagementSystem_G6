<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Duyệt hoàn tiền</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <div th:replace="~{layout/sidebar :: sidebar('refunds')}"></div>
        <div class="col-md-10 bg-light p-4">
            <div class="d-flex justify-content-between align-items-center pb-3 mb-4 border-bottom">
                <h2 class="text-secondary fw-bold">Chi tiết Yêu cầu Hoàn tiền</h2>
                <div class="d-flex gap-2">
                <a href="/refunds/pending" class="btn btn-outline-secondary"><i class="fa-solid fa-arrow-left me-1"></i>Quay lại</a>
                </div>
            </div>
            <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
                <span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
                <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div class="row justify-content-center">
                <div class="col-md-8">
                    <div class="container py-4" style="max-width:600px">

    <div class="d-flex align-items-center mb-3">
        <a href="/refunds" class="btn btn-outline-secondary btn-sm me-3">
            <i class="fa-solid fa-arrow-left"></i>
        </a>
        <h4 class="mb-0"><i class="fa-solid fa-rotate-left me-2 text-warning"></i>Chi tiết Yêu cầu hoàn tiền</h4>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <!-- Template này dùng khi cần xem chi tiết trước khi duyệt.
         Hiện tại duyệt được xử lý trực tiếp từ refunds/history.html qua POST.
         Trang này là fallback nếu cần hiển thị chi tiết. -->
    <div class="alert alert-info">
        <i class="fa-solid fa-info-circle me-1"></i>
        Để duyệt hoàn tiền, vui lòng dùng trang <a href="/refunds">Danh sách hoàn tiền</a>.
    </div>

    <a href="/refunds" class="btn btn-primary">
        <i class="fa-solid fa-list me-1"></i>Xem danh sách hoàn tiền
    </a>
    <div class="mt-3"><a href="/" class="btn btn-secondary"><i class="fa-solid fa-arrow-left me-1"></i>Trang chủ</a></div>

</div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
