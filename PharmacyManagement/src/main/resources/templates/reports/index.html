<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Báo cáo Thống kê</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/flow4.css}" rel="stylesheet">
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <div th:replace="~{layout/sidebar :: sidebar('reports')}"></div>
        <div class="col-md-10 bg-light p-3">
<section class="panel">
            <div class="panel-header"><h2>Bộ lọc báo cáo</h2></div>
            <div class="toolbar">
                <div class="form-group">
                    <label for="fromDate">Từ ngày</label>
                    <input type="date" id="fromDate">
                    <div class="field-error" data-error-for="fromDate"></div>
                </div>
                <div class="form-group">
                    <label for="toDate">Đến ngày</label>
                    <input type="date" id="toDate">
                    <div class="field-error" data-error-for="toDate"></div>
                </div>
                <div class="form-group">
                    <label for="branchId">Chi nhánh</label>
                    <input type="number" id="branchId" min="1" placeholder="Để trống = tất cả">
                </div>
                <button class="btn btn-primary" id="loadRevenueBtn">Doanh thu</button>
                <button class="btn btn-blue" id="loadExpenseBtn">Chi phí</button>
                <button class="btn btn-warning" id="loadInventoryBtn">Nhập xuất tồn</button>
            </div>
        </section>

        <section class="panel">
            <div class="panel-header">
                <h2 id="reportTitle">Kết quả báo cáo</h2>
            </div>
            <div class="table-wrapper">
                <table>
                    <thead id="reportHead"></thead>
                    <tbody id="reportBody">
                    <tr><td class="empty-state">Chọn loại báo cáo để xem dữ liệu</td></tr>
                    </tbody>
                </table>
            </div>
        </section>
        </div>
    </div>
</div>
<div th:replace="~{fragments :: toast}"></div>
<div th:replace="~{fragments :: confirmModal}"></div>
<script th:src="@{/js/flow4/common.js}"></script>
<script th:src="@{/js/flow4/reports.js}"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
