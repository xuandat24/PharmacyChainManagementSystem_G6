<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:if="${_csrf != null}" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:if="${_csrf != null}" th:content="${_csrf.headerName}">
    <title>Báo cáo</title>
    <link rel="stylesheet" th:href="@{/css/flow4.css}">
</head>
<body>
<div class="flow4-layout">
    <div th:replace="~{fragments :: sidebar('reports')}"></div>
    <main class="flow4-main">
        <div th:replace="~{fragments :: topbar('Báo cáo', 'Xem doanh thu, chi phí và nhập xuất tồn')}"></div>

        <section class="panel">
            <div class="panel-header"><h2>Bộ lọc báo cáo</h2></div>
            <div class="toolbar">
                <div class="form-group">
                    <label for="fromDate">Từ ngày</label>
                    <input type="date" id="fromDate">
                    <div class="field-error" data-error-for="fromDate"></div>
                </div>
                <div class="form-group">
                    <label for="toDate">Đến ngày</label>
                    <input type="date" id="toDate">
                    <div class="field-error" data-error-for="toDate"></div>
                </div>
                <div class="form-group">
                    <label for="branchId">Chi nhánh</label>
                    <input type="number" id="branchId" min="1" placeholder="Để trống = tất cả">
                </div>
                <button class="btn btn-primary" id="loadRevenueBtn">Doanh thu</button>
                <button class="btn btn-blue" id="loadExpenseBtn">Chi phí</button>
                <button class="btn btn-warning" id="loadInventoryBtn">Nhập xuất tồn</button>
            </div>
        </section>

        <section class="panel">
            <div class="panel-header">
                <h2 id="reportTitle">Kết quả báo cáo</h2>
            </div>
            <div class="table-wrapper">
                <table>
                    <thead id="reportHead"></thead>
                    <tbody id="reportBody">
                    <tr><td class="empty-state">Chọn loại báo cáo để xem dữ liệu</td></tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>
</div>
<div th:replace="~{fragments :: toast}"></div>
<script th:src="@{/js/flow4/common.js}"></script>
<script th:src="@{/js/flow4/reports.js}"></script>
</body>
</html>
