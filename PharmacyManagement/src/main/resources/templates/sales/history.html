<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lịch sử bán hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <div th:replace="~{layout/sidebar :: sidebar('sales')}"></div>
        <div class="col-md-10 bg-light p-4">
            <div class="d-flex justify-content-between align-items-center pb-3 mb-4 border-bottom">
                <h2 class="text-secondary fw-bold">Lịch sử Hóa đơn</h2>
                <div class="d-flex gap-2">
                <a href="/sales/cart" class="btn btn-success"><i class="fa-solid fa-plus me-1"></i>Bán hàng mới</a>
                </div>
            </div>
            <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
                <span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
                <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div class="card shadow-sm border-0 bg-white">
                <div class="card-body p-0">
                    <table class="table table-hover align-middle mb-0">
                <thead class="table-dark">
                <tr>
                    <th>Mã HĐ</th>
                    <th>Ngày bán</th>
                    <th>Khách hàng</th>
                    <th>Dược sĩ</th>
                    <th class="text-end">Tổng tiền</th>
                    <th class="text-center">Trạng thái</th>
                    <th class="text-center">Thao tác</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="s : ${sales}">
                    <td class="fw-semibold text-primary" th:text="${s.saleCode}"></td>
                    <td>
                        <span th:text="${#temporals.format(s.saleDate,'dd/MM/yyyy HH:mm')}"></span>
                    </td>
                    <td th:text="${s.customerName != null ? s.customerName : 'Khách vãng lai'}"></td>
                    <td th:text="${s.pharmacistName}"></td>
                    <td class="text-end fw-bold"
                        th:text="${#numbers.formatInteger(s.finalAmount, 1, 'COMMA')} + ' đ'"></td>
                    <td class="text-center">
                        <span class="badge"
                              th:classappend="${s.status == 'COMPLETED'} ? 'bg-success'
                                : (${s.status == 'DRAFT'} ? 'bg-warning text-dark'
                                : (${s.status == 'VOIDED'} ? 'bg-secondary'
                                : 'bg-danger'))"
                              th:text="${s.status}"></span>
                    </td>
                    <td class="text-center">
                        <a th:href="@{/sales/{id}(id=${s.saleId})}"
                           class="btn btn-sm btn-outline-primary me-1">
                            <i class="fa-solid fa-eye"></i>
                        </a>
                        <a th:if="${s.status == 'COMPLETED'}"
                           th:href="@{/refunds/create/{id}(id=${s.saleId})}"
                           class="btn btn-sm btn-outline-warning">
                            <i class="fa-solid fa-rotate-left"></i>
                        </a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(sales)}">
                    <td colspan="7" class="text-center text-muted py-5">
                        <i class="fa-solid fa-receipt fa-2x d-block mb-2 opacity-25"></i>
                        Chưa có hóa đơn nào
                    </td>
                </tr>
                </tbody>
            </table>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
