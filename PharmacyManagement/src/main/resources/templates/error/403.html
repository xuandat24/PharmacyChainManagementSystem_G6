<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Không có quyền truy cập</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="d-flex justify-content-center align-items-center" style="min-height: 100vh;">
    <div class="text-center">
        <div class="mb-4">
            <i class="fa-solid fa-lock fa-5x text-danger opacity-50"></i>
        </div>
        <h1 class="fw-bold text-danger mb-2">Bạn không có quyền hạn truy cập</h1>
        <p class="text-muted mb-1">Tài khoản của bạn không có quyền thực hiện thao tác này.</p>
        <p class="text-muted mb-4">
            Vui lòng liên hệ quản trị viên nếu bạn cần cấp quyền.
        </p>
        <div class="d-flex gap-2 justify-content-center">
            <a href="/" class="btn btn-primary">
                <i class="fa-solid fa-house me-1"></i>Về trang chủ
            </a>
            <button onclick="history.back()" class="btn btn-outline-secondary">
                <i class="fa-solid fa-arrow-left me-1"></i>Quay lại
            </button>
        </div>
        <div class="mt-4 text-muted small"
             th:if="${session.loggedInUser != null}">
            Đang đăng nhập với vai trò:
            <span class="badge bg-secondary"
                  th:text="${session.loggedInUser.role}"></span>
        </div>
    </div>
</div>
</body>
</html>
