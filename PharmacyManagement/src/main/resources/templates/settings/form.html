<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cấu hình Hệ thống</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container-fluid">
    <div class="row">
        <div th:replace="~{layout/sidebar :: sidebar('settings')}"></div>
        <div class="col-md-10 p-4">
            <div class="row justify-content-center">
                <div class="col-md-7">
                    <div class="card shadow">
                        <div class="card-header bg-primary text-white">
                            <h4 class="mb-0">
                                <i class="fa-solid fa-sliders me-2"></i>
                                <span th:text="${setting.settingId != null} ? 'Sửa Cấu hình' : 'Thêm Cấu hình Mới'"></span>
                            </h4>
                        </div>
                        <div class="card-body">
                            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                            <!-- FIX: xóa th:field="*{status}" — SystemSettingDTO không có field status
                                 (SystemSetting entity cũng không có status theo schema DB) -->
                            <form th:action="@{/settings/save}" th:object="${setting}" method="post">
                                <input type="hidden" th:field="*{settingId}" />

                                <div class="mb-3">
                                    <label class="form-label fw-bold">Setting Key <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control font-monospace" th:field="*{settingKey}"
                                           required placeholder="VD: PURCHASE_APPROVAL_LIMIT"
                                           th:readonly="${setting.settingId != null}" />
                                    <div class="form-text" th:if="${setting.settingId != null}">
                                        Key không thể thay đổi sau khi tạo
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-bold">Giá trị <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" th:field="*{settingValue}"
                                           required placeholder="VD: 5000000" />
                                    <div class="form-text">
                                        MONEY: nhập số nguyên (VND). INT: nhập số nguyên. STRING: nhập chuỗi bất kỳ.
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-bold">Mô tả</label>
                                    <textarea class="form-control" th:field="*{description}" rows="2"
                                              placeholder="Giải thích ý nghĩa của cấu hình này..."></textarea>
                                </div>

                                <hr>
                                <div class="d-flex justify-content-end gap-2">
                                    <a th:href="@{/settings}" class="btn btn-secondary">
                                        <i class="fa-solid fa-arrow-left me-1"></i>Quay lại
                                    </a>
                                    <button type="submit" class="btn btn-success">
                                        <i class="fa-solid fa-floppy-disk me-1"></i>Lưu cấu hình
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
