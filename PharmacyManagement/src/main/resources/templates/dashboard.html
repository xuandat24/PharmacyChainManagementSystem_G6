<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Kiểm soát</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <div th:replace="~{layout/sidebar :: sidebar('flow4-dashboard')}"></div>
        <div class="col-md-10 bg-light p-4">

            <!-- Header -->
            <div class="d-flex justify-content-between align-items-center pb-3 mb-4 border-bottom">
                <h2 class="text-secondary fw-bold">
                    <i class="fa-solid fa-gauge-high me-2"></i>Dashboard Kiểm soát
                </h2>
                <div class="d-flex align-items-center gap-3">
                    <div class="form-group mb-0 d-flex align-items-center gap-2">
                        <label class="text-muted small mb-0">Chi nhánh</label>
                        <input type="number" id="branchId" class="form-control form-control-sm" style="width:120px"
                               min="1" placeholder="Tất cả">
                    </div>
                    <button class="btn btn-primary btn-sm" id="reloadDashboardBtn">
                        <i class="fa-solid fa-rotate me-1"></i>Tải dữ liệu
                    </button>
                </div>
            </div>

            <!-- Thẻ thống kê hàng 1 -->
            <div class="row g-3 mb-3">
                <div class="col-md-3">
                    <div class="card border-0 shadow-sm p-3 bg-white border-start border-success border-4">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <div class="text-muted small">Doanh thu hôm nay</div>
                                <h4 class="fw-bold text-success mb-0" id="todayRevenue">—</h4>
                            </div>
                            <span class="fs-2">💰</span>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card border-0 shadow-sm p-3 bg-white border-start border-primary border-4">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <div class="text-muted small">Hóa đơn hôm nay</div>
                                <h4 class="fw-bold text-primary mb-0" id="todaySalesCount">—</h4>
                            </div>
                            <span class="fs-2">🧾</span>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card border-0 shadow-sm p-3 bg-white border-start border-warning border-4">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <div class="text-muted small">Điều chuyển chờ duyệt</div>
                                <h4 class="fw-bold text-warning mb-0" id="pendingTransferCount">—</h4>
                            </div>
                            <span class="fs-2">🚚</span>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card border-0 shadow-sm p-3 bg-white border-start border-danger border-4">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <div class="text-muted small">Phiếu chi chờ duyệt</div>
                                <h4 class="fw-bold text-danger mb-0" id="pendingExpenseCount">—</h4>
                            </div>
                            <span class="fs-2">💸</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Thẻ thống kê hàng 2 -->
            <div class="row g-3 mb-4">
                <div class="col-md-3">
                    <div class="card border-0 shadow-sm p-3 bg-white">
                        <div class="text-muted small">Tiền mặt hôm nay</div>
                        <h5 class="fw-bold text-success mb-0" id="todayCashRevenue">—</h5>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card border-0 shadow-sm p-3 bg-white">
                        <div class="text-muted small">Online hôm nay</div>
                        <h5 class="fw-bold text-info mb-0" id="todayOnlineRevenue">—</h5>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card border-0 shadow-sm p-3 bg-white">
                        <div class="text-muted small">Giá trị nhập hàng</div>
                        <h5 class="fw-bold text-secondary mb-0" id="todayGoodsReceiptAmount">—</h5>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card border-0 shadow-sm p-3 bg-white">
                        <div class="text-muted small">Tồn thấp / Sắp hết hạn</div>
                        <h5 class="fw-bold text-danger mb-0">
                            <span id="lowStockCount">0</span>
                            <span class="text-muted">/</span>
                            <span id="nearExpiryCount">0</span>
                        </h5>
                    </div>
                </div>
            </div>

            <!-- Thao tác nhanh -->
            <div class="card shadow-sm border-0 bg-white">
                <div class="card-header bg-white fw-bold">
                    <i class="fa-solid fa-bolt me-2 text-warning"></i>Thao tác nhanh
                </div>
                <div class="card-body d-flex flex-wrap gap-2">
                    <a class="btn btn-primary" th:href="@{/flow4/transfers/create}">
                        <i class="fa-solid fa-dolly me-1"></i>Tạo điều chuyển
                    </a>
                    <a class="btn btn-outline-primary" th:href="@{/flow4/expenses/create}">
                        <i class="fa-solid fa-money-bill me-1"></i>Tạo phiếu chi
                    </a>
                    <a class="btn btn-outline-secondary" th:href="@{/flow4/reports}">
                        <i class="fa-solid fa-chart-line me-1"></i>Xem báo cáo
                    </a>
                    <a class="btn btn-outline-secondary" th:href="@{/flow4/periods}">
                        <i class="fa-solid fa-lock me-1"></i>Khóa sổ tháng
                    </a>
                </div>
            </div>

        </div>
    </div>
</div>
<script th:src="@{/js/flow4/common.js}"></script>
<script th:src="@{/js/flow4/dashboard.js}"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
