<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<body>

<aside class="flow4-sidebar" th:fragment="sidebar(active)">
    <div class="flow4-brand">
        <div class="flow4-logo">💊</div>
        <div>
            <h2>Pharmacy</h2>
            <p>Flow 4 Control</p>
        </div>
    </div>

    <nav class="flow4-menu">
        <a th:href="@{/flow4/dashboard}" th:classappend="${active == 'dashboard'} ? 'active' : ''">🏠 Dashboard</a>
        <a th:href="@{/flow4/transfers}" th:classappend="${active == 'transfers'} ? 'active' : ''">🚚 Điều chuyển</a>
        <a th:href="@{/flow4/expenses}" th:classappend="${active == 'expenses'} ? 'active' : ''">💸 Phiếu chi</a>
        <a th:href="@{/flow4/reports}" th:classappend="${active == 'reports'} ? 'active' : ''">📊 Báo cáo</a>
        <a th:href="@{/flow4/periods}" th:classappend="${active == 'periods'} ? 'active' : ''">🔒 Khóa sổ</a>
        <a th:href="@{/flow4/notifications}" th:classappend="${active == 'notifications'} ? 'active' : ''">🔔 Thông báo</a>
        <a th:href="@{/flow4/audit-logs}" th:classappend="${active == 'audit'} ? 'active' : ''">🧾 Audit log</a>
        <div class="mt-3"><a href="/" class="btn btn-secondary"><i class="fa-solid fa-arrow-left me-1"></i>Trang chủ</a></div>
    </nav>
</aside>

<header class="flow4-topbar" th:fragment="topbar(title, subtitle)">
    <div class="flow4-title">
        <h1 th:text="${title}">Tiêu đề</h1>
        <p th:text="${subtitle}">Mô tả</p>
    </div>
    <!-- FIX: hiển thị user thật từ session thay vì hardcode "Demo user ID: 1" -->
    <div class="flow4-user" style="display:flex;align-items:center;gap:12px;">
        <div th:if="${session.loggedInUser != null}">
            <strong th:text="${session.loggedInUser.fullName}">Người dùng</strong>
            <span th:text="${session.loggedInUser.role}" style="display:block;font-size:0.8em;opacity:0.7;"></span>
        </div>
        <!-- Nút đăng xuất cho dashboard Người 4 -->
        <a href="/logout" style="background:#e74c3c;color:white;padding:6px 14px;border-radius:6px;text-decoration:none;font-size:0.85em;white-space:nowrap;">
            ⏏ Đăng xuất
        </a>
    </div>
</header>

<div class="toast-wrap" th:fragment="toast"></div>

<div class="modal-backdrop" id="confirmModal" th:fragment="confirmModal">
    <div class="modal">
        <h3 id="confirmTitle">Xác nhận</h3>
        <p id="confirmMessage">Bạn có chắc chắn muốn thực hiện thao tác này?</p>
        <div class="form-group" id="confirmReasonGroup">
            <label for="confirmReason">Lý do / ghi chú</label>
            <textarea id="confirmReason" maxlength="500" placeholder="Nhập lý do nếu cần"></textarea>
            <div class="field-error" data-error-for="reason"></div>
        </div>
        <div class="modal-actions">
            <button type="button" class="btn btn-light" id="confirmCancelBtn">Hủy</button>
            <button type="button" class="btn btn-primary" id="confirmOkBtn">Xác nhận</button>
        </div>
    </div>
</div>

</body>
</html>
