<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Loại thuốc</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <div th:replace="~{layout/sidebar :: sidebar('categories')}"></div>
        <div class="col-md-10 bg-light p-4">
            <div class="d-flex justify-content-between align-items-center pb-3 mb-4 border-bottom">
                <h2 class="text-secondary fw-bold"><span th:text="${{category.categoryId != null}} ? 'Sửa Loại thuốc' : 'Thêm Loại thuốc Mới'">Loại thuốc</span></h2>
                <div class="d-flex gap-2">
                </div>
            </div>
            <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
                <span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
                <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div class="row justify-content-center">
                <div class="col-md-7">
                    <div class="card shadow-sm border-0 bg-white">
                        <div class="card-body">
                            <form th:action="@{/categories/save}" th:object="${category}" method="post">

                                <input type="hidden" th:field="*{categoryId}" />

                                <div class="mb-3">
                                    <label class="form-label fw-bold">Tên loại thuốc <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" th:field="*{categoryName}" required placeholder="VD: Kháng sinh, Vitamin..." />
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-bold">Mô tả</label>
                                    <textarea class="form-control" th:field="*{description}" rows="3" placeholder="Nhập ghi chú..."></textarea>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-bold">Trạng thái</label>
                                    <select class="form-select" th:field="*{status}">
                                        <option value="ACTIVE">Hoạt động (ACTIVE)</option>
                                        <option value="INACTIVE">Ngừng hoạt động (INACTIVE)</option>
                                    </select>
                                </div>

                                <hr>
                                <div class="d-flex justify-content-end gap-2">
                                    <a th:href="@{/categories}" class="btn btn-secondary">Quay lại</a>
                                    <button type="submit" class="btn btn-success">Lưu dữ liệu</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
