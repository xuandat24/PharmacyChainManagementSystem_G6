<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thông tin Loại thuốc</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">Nhập thông tin Loại thuốc</h4>
                </div>
                <div class="card-body">
                    <form th:action="@{/categories/save}" th:object="${category}" method="post">

                        <input type="hidden" th:field="*{categoryId}" />

                        <div class="mb-3">
                            <label class="form-label fw-bold">Tên loại thuốc <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" th:field="*{categoryName}" required placeholder="VD: Kháng sinh, Vitamin..." />
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Mô tả</label>
                            <textarea class="form-control" th:field="*{description}" rows="3" placeholder="Nhập ghi chú..."></textarea>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Trạng thái</label>
                            <select class="form-select" th:field="*{status}">
                                <option value="ACTIVE">Hoạt động (ACTIVE)</option>
                                <option value="INACTIVE">Ngừng hoạt động (INACTIVE)</option>
                            </select>
                        </div>

                        <hr>
                        <div class="d-flex justify-content-end gap-2">
                            <a th:href="@{/categories}" class="btn btn-secondary">Quay lại</a>
                            <button type="submit" class="btn btn-success">Lưu dữ liệu</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
