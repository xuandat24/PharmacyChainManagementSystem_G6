<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:if="${_csrf != null}" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:if="${_csrf != null}" th:content="${_csrf.headerName}">
    <title>Điều chuyển thuốc</title>
    <link rel="stylesheet" th:href="@{/css/flow4.css}">
</head>
<body>
<div class="flow4-layout">
    <div th:replace="~{fragments :: sidebar('transfers')}"></div>
    <main class="flow4-main">
        <div th:replace="~{fragments :: topbar('Điều chuyển thuốc', 'Quản lý phiếu điều chuyển giữa các chi nhánh')}"></div>

        <section class="panel">
            <div class="panel-header">
                <h2>Danh sách phiếu điều chuyển</h2>
                <a class="btn btn-primary" th:href="@{/flow4/transfers/create}">+ Tạo phiếu</a>
            </div>
            <div class="toolbar">
                <div class="form-group" style="max-width: 220px;">
                    <label for="branchFilter">Chi nhánh liên quan</label>
                    <input type="number" id="branchFilter" min="1" placeholder="Để trống = tất cả">
                </div>
                <button class="btn btn-light" id="reloadTransfersBtn">Tải lại</button>
            </div>
            <div class="table-wrapper">
                <table>
                    <thead>
                    <tr>
                        <th>Mã phiếu</th>
                        <th>Chi nhánh gửi</th>
                        <th>Chi nhánh nhận</th>
                        <th>Trạng thái</th>
                        <th>Giá trị</th>
                        <th>Ngày tạo</th>
                        <th>Thao tác</th>
                    </tr>
                    </thead>
                    <tbody id="transferTableBody">
                    <tr><td colspan="7" class="empty-state">Đang tải dữ liệu...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>
</div>
<div th:replace="~{fragments :: toast}"></div>
<script th:src="@{/js/flow4/common.js}"></script>
<script th:src="@{/js/flow4/transfers-list.js}"></script>
</body>
</html>
