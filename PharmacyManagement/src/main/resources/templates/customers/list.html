<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Khách hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container-fluid py-4 px-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4><i class="fa-solid fa-users text-primary me-2"></i>Khách hàng</h4>
        <a href="/customers/create" class="btn btn-success"><i class="fa-solid fa-plus me-1"></i>Thêm mới</a>
    </div>
    <form method="get" action="/customers" class="mb-3">
        <div class="input-group" style="max-width:500px">
            <input type="text" name="search" class="form-control"
                   placeholder="Tìm theo SĐT hoặc họ tên..." th:value="${search}">
            <button class="btn btn-primary" type="submit"><i class="fa-solid fa-search"></i></button>
            <a href="/customers" class="btn btn-outline-secondary">Xóa</a>
        </div>
    </form>
    <div class="card shadow-sm border-0">
        <table class="table table-hover align-middle mb-0">
            <thead class="table-primary">
            <tr>
                <th>ID</th><th>Họ tên</th><th>SĐT</th><th>Ngày sinh</th>
                <th>Giới tính</th><th>Dị ứng</th><th class="text-center">Thao tác</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="c : ${customers}">
                <td class="text-muted small" th:text="${c.customerId}"></td>
                <td class="fw-semibold" th:text="${c.fullName}"></td>
                <td th:text="${c.phone}"></td>
                <td th:text="${c.dateOfBirth}"></td>
                <td th:text="${c.gender}"></td>
                <td>
                    <span class="badge bg-danger" th:if="${c.allergyNote != null}" th:text="${c.allergyNote}"></span>
                </td>
                <td class="text-center">
                    <a th:href="@{/customers/{id}(id=${c.customerId})}" class="btn btn-sm btn-outline-info me-1"><i class="fa-solid fa-eye"></i></a>
                    <a th:href="@{/customers/edit/{id}(id=${c.customerId})}" class="btn btn-sm btn-outline-warning me-1"><i class="fa-solid fa-pen"></i></a>
                    <a th:href="@{/prescriptions(customerId=${c.customerId})}" class="btn btn-sm btn-outline-success"><i class="fa-solid fa-prescription"></i></a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(customers)}">
                <td colspan="7" class="text-center text-muted py-4">Không tìm thấy khách hàng</td>
            </tr>
            </tbody>
        </table>
    </div>
    <div class="mt-3"><a href="/" class="btn btn-secondary"><i class="fa-solid fa-arrow-left me-1"></i>Trang chủ</a></div>
</div>
</body></html>
