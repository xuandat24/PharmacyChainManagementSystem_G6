<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết Khách hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <div th:replace="~{layout/sidebar :: sidebar('customers')}"></div>
        <div class="col-md-10 bg-light p-4">
            <div class="d-flex justify-content-between align-items-center pb-3 mb-4 border-bottom">
                <h2 class="text-secondary fw-bold">Chi tiết Khách hàng</h2>
                <div class="d-flex gap-2">
                <a th:href="@{/customers/edit/{id}(id=${customer.customerId})}" class="btn btn-outline-warning"><i class="fa-solid fa-pen me-1"></i>Sửa</a>
                </div>
            </div>
            <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
                <span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
                <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div class="container py-4">
  <div class="card shadow-sm border-0 mb-4">
    <div class="card-header bg-primary text-white d-flex justify-content-between">
      <h5 class="mb-0"><i class="fa-solid fa-user me-2"></i>Thông tin Khách hàng</h5>
      <a th:href="@{/customers/edit/{id}(id=${customer.customerId})}" class="btn btn-sm btn-light">Sửa</a>
    </div>
    <div class="card-body row">
      <div class="col-md-6">
        <p><strong>Họ tên:</strong> <span th:text="${customer.fullName}"></span></p>
        <p><strong>SĐT:</strong> <span th:text="${customer.phone}"></span></p>
        <p><strong>Ngày sinh:</strong> <span th:text="${customer.dateOfBirth}"></span></p>
      </div>
      <div class="col-md-6">
        <p><strong>Giới tính:</strong> <span th:text="${customer.gender}"></span></p>
        <p><strong>Địa chỉ:</strong> <span th:text="${customer.address}"></span></p>
        <p><strong>Dị ứng:</strong>
          <span class="badge bg-danger" th:if="${customer.allergyNote != null}" th:text="${customer.allergyNote}"></span>
          <span th:unless="${customer.allergyNote != null}" class="text-muted">Không có</span>
        </p>
      </div>
    </div>
  </div>
  <div class="d-flex gap-2">
    <a th:href="@{/prescriptions(customerId=${customer.customerId})}" class="btn btn-success">
      <i class="fa-solid fa-prescription me-1"></i>Đơn thuốc
    </a>
    <a href="/customers" class="btn btn-secondary"><i class="fa-solid fa-arrow-left me-1"></i>Quay lại</a>
  </div>
</div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
