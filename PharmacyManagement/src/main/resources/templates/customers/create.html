<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thêm khách hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <div th:replace="~{layout/sidebar :: sidebar('customers')}"></div>
        <div class="col-md-10 bg-light p-4">
            <div class="d-flex justify-content-between align-items-center pb-3 mb-4 border-bottom">
                <h2 class="text-secondary fw-bold">Thêm Khách hàng Mới</h2>
                <div class="d-flex gap-2">
                </div>
            </div>
            <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
                <span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
                <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div class="row justify-content-center">
                <div class="col-md-8">
                    <div class="card shadow-sm border-0 bg-white">
                        <div class="card-body">
                            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
                            <form th:action="@{/customers/create}" th:object="${customerDTO}" method="post">

                <div class="mb-3">
                    <label class="form-label fw-semibold">Họ và tên <span class="text-danger">*</span></label>
                    <input type="text" th:field="*{fullName}"
                           class="form-control"
                           th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid'"
                           placeholder="Nguyễn Văn A" required>
                    <div th:if="${#fields.hasErrors('fullName')}" class="invalid-feedback"
                         th:errors="*{fullName}"></div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-semibold">Số điện thoại</label>
                        <input type="text" th:field="*{phone}" class="form-control"
                               placeholder="0901234567">
                        <div th:if="${#fields.hasErrors('phone')}" class="invalid-feedback"
                             th:errors="*{phone}"></div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-semibold">Ngày sinh</label>
                        <input type="date" th:field="*{dateOfBirth}" class="form-control">
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Giới tính</label>
                    <select th:field="*{gender}" class="form-select">
                        <option value="">-- Chọn --</option>
                        <option value="MALE">Nam</option>
                        <option value="FEMALE">Nữ</option>
                        <option value="OTHER">Khác</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Địa chỉ</label>
                    <input type="text" th:field="*{address}" class="form-control">
                </div>

                <div class="mb-4">
                    <label class="form-label fw-semibold">Ghi chú dị ứng</label>
                    <textarea th:field="*{allergyNote}" class="form-control" rows="2"
                              placeholder="Dị ứng Penicillin, Aspirin..."></textarea>
                    <div class="form-text text-warning">
                        <i class="fa-solid fa-triangle-exclamation me-1"></i>
                        Thông tin quan trọng — điền nếu khách có dị ứng thuốc.
                    </div>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-success">
                        <i class="fa-solid fa-save me-1"></i>Lưu
                    </button>
                    <a href="/customers" class="btn btn-outline-secondary">Hủy</a>
                </div>
            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
