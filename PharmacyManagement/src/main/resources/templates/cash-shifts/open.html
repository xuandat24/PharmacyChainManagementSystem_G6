<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><title>Ca bán hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4" style="max-width:520px">

    <h4 class="mb-3"><i class="fa-solid fa-clock-rotate-left me-2 text-primary"></i>Ca bán hàng</h4>

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${warning}" class="alert alert-warning alert-dismissible fade show">
        <span th:text="${warning}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Ca đang mở -->
    <div th:if="${openShift != null}" class="card border-0 shadow-sm mb-3 border-start border-success border-4">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-start mb-2">
                <h6 class="mb-0 text-success"><i class="fa-solid fa-circle-dot me-2"></i>Ca đang mở</h6>
                <span class="badge bg-success">OPEN</span>
            </div>
            <div class="small text-muted">
                Mở lúc: <span th:text="${#temporals.format(openShift.openedAt,'dd/MM/yyyy HH:mm')}"></span>
            </div>
            <div class="small text-muted">
                Dược sĩ: <span th:text="${openShift.pharmacistName}"></span>
            </div>
            <div class="mt-3">
                <a th:href="@{/cash-shifts/close/{id}(id=${openShift.cashShiftId})}"
                   class="btn btn-warning w-100">
                    <i class="fa-solid fa-door-closed me-2"></i>Chốt ca
                </a>
            </div>
        </div>
    </div>

    <!-- Mở ca mới nếu chưa có -->
    <div th:if="${openShift == null}" class="card border-0 shadow-sm mb-3">
        <div class="card-body text-center py-4">
            <i class="fa-solid fa-business-time fa-3x text-muted opacity-25 mb-3"></i>
            <p class="text-muted">Bạn chưa có ca làm việc nào đang mở.</p>
            <form th:action="@{/cash-shifts/open}" method="post">
                <button type="submit" class="btn btn-primary px-5">
                    <i class="fa-solid fa-play me-2"></i>Bắt đầu ca làm việc
                </button>
            </form>
        </div>
    </div>

    <!-- Lịch sử ca gần đây -->
    <div th:if="${!#lists.isEmpty(allShifts)}" class="card border-0 shadow-sm">
        <div class="card-header bg-white fw-bold">Lịch sử ca</div>
        <div class="card-body p-0">
            <table class="table table-sm align-middle mb-0">
                <thead class="table-light">
                <tr>
                    <th>Mở lúc</th>
                    <th>Đóng lúc</th>
                    <th class="text-end">Chênh lệch</th>
                    <th class="text-center">Trạng thái</th>
                    <th></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="s : ${allShifts}" th:if="${s.status != 'OPEN'}">
                    <td class="small" th:text="${#temporals.format(s.openedAt,'dd/MM HH:mm')}"></td>
                    <td class="small" th:text="${s.closedAt != null ? #temporals.format(s.closedAt,'dd/MM HH:mm') : '-'}"></td>
                    <td class="text-end small"
                        th:classappend="${s.differenceAmount != null and s.differenceAmount < 0} ? 'text-danger' : 'text-success'"
                        th:text="${s.differenceAmount != null ? #numbers.formatInteger(s.differenceAmount, 1, 'COMMA') + ' đ' : '-'}">
                    </td>
                    <td class="text-center">
                        <span class="badge"
                              th:classappend="${s.status == 'CONFIRMED'} ? 'bg-success'
                                : (${s.status == 'PENDING_ADMIN_REVIEW'} ? 'bg-danger'
                                : 'bg-secondary')"
                              th:text="${s.status}"></span>
                    </td>
                    <td>
                        <form th:if="${s.status == 'CLOSED'}"
                              th:action="@{/cash-shifts/confirm/{id}(id=${s.cashShiftId})}"
                              method="post">
                            <button type="submit" class="btn btn-xs btn-sm btn-outline-success py-0 px-1 small">
                                Xác nhận
                            </button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
    <div class="mt-3"><a href="/" class="btn btn-secondary"><i class="fa-solid fa-arrow-left me-1"></i>Quay lại</a></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
