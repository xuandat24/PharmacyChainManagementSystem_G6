<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Chốt ca</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4" style="max-width:520px">
    <div class="card shadow border-0">
        <div class="card-header bg-danger text-white">
            <h5 class="mb-0"><i class="fa-solid fa-door-closed me-2"></i>Chốt ca bán hàng</h5>
        </div>
        <div class="card-body">
            <!-- Thông tin ca -->
            <div class="alert alert-light border mb-3">
                <div class="d-flex justify-content-between">
                    <span><strong>Ca #<span th:text="${shift.cashShiftId}"></span></strong></span>
                    <span class="text-muted small">Dược sĩ: <span th:text="${shift.pharmacistName}"></span></span>
                </div>
                <p class="mb-0 text-muted small mt-1">
                    Bắt đầu: <span th:text="${#temporals.format(shift.openedAt,'dd/MM/yyyy HH:mm')}"></span>
                </p>
            </div>

            <div class="alert alert-info small mb-4">
                <i class="fa-solid fa-info-circle me-1"></i>
                Đếm toàn bộ tiền mặt thực tế trong két và nhập vào bên dưới.
                Hệ thống sẽ so sánh với doanh thu tính toán được.
            </div>

            <!-- FIX: dùng th:object và th:field để bind đúng vào CashShiftDTO.actualCashAmount -->
            <form th:action="@{/cash-shifts/close/{id}(id=${shift.cashShiftId})}"
                  th:object="${cashShiftDTO}" method="post">

                <div class="mb-3">
                    <label class="form-label fw-semibold fs-5">Tiền mặt thực tế (đồng)</label>
                    <!-- FIX: name="actualCash" → th:field="*{actualCashAmount}" -->
                    <input type="number"
                           th:field="*{actualCashAmount}"
                           class="form-control form-control-lg"
                           th:classappend="${#fields.hasErrors('actualCashAmount')} ? 'is-invalid'"
                           required min="0" step="1000" placeholder="0">
                    <div th:if="${#fields.hasErrors('actualCashAmount')}"
                         class="invalid-feedback" th:errors="*{actualCashAmount}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Ghi chú (tùy chọn)</label>
                    <textarea th:field="*{note}" class="form-control" rows="2"
                              placeholder="Lý do chênh lệch nếu có..."></textarea>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-danger btn-lg"
                            onclick="return confirm('Xác nhận chốt ca? Không thể hoàn tác.')">
                        <i class="fa-solid fa-check me-2"></i>Xác nhận Chốt ca
                    </button>
                    <a href="/cash-shifts" class="btn btn-outline-secondary">Hủy</a>
                </div>
            </form>
        </div>
    </div>
    <div class="mt-3"><a href="/" class="btn btn-secondary"><i class="fa-solid fa-arrow-left me-1"></i>Trang chủ</a></div>
</div>
</body>
</html>
