<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Phê duyệt Yêu cầu nhập hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        .sidebar { min-height: 100vh; background-color: #212529; }
        .sidebar a { color: #dee2e6; text-decoration: none; }
        .sidebar a:hover { background-color: #495057; color: white !important; }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <div th:replace="~{layout/sidebar :: sidebar('purchase')}"></div>
        <div class="col-md-10 bg-light p-4">
            <div class="pb-3 mb-4 border-bottom">
                <!-- FIX: pr.requestId → pr.purchaseRequestId -->
                <h2 class="text-secondary fw-bold">Phê duyệt PR-<span th:text="${pr.purchaseRequestId}"></span></h2>
                <p class="text-muted">
                    Chi nhánh: <strong th:text="${pr.branch != null ? pr.branch.branchName : 'CN-' + pr.branchId}"></strong>
                    <!-- FIX: pr.createdBy không tồn tại → pr.requestedBy (integer) -->
                    | Người tạo: ID <span th:text="${pr.requestedBy}"></span>
                </p>
            </div>
            <div class="card shadow-sm border-0 bg-white p-4">
                <!-- FIX: pr.requestId → pr.purchaseRequestId -->
                <form th:action="@{/purchase-requests/admin/approve/{id}(id=${pr.purchaseRequestId})}" method="post">
                    <h5 class="fw-bold border-bottom pb-2 mb-3">Danh sách thuốc đề xuất</h5>
                    <div class="table-responsive mb-4">
                        <table class="table table-bordered align-middle text-center">
                            <thead class="table-light">
                            <tr>
                                <th>Tên Thuốc</th>
                                <th>Đơn Giá Dự Kiến</th>
                                <th>Số Lượng Yêu Cầu</th>
                                <th style="width:25%">Số Lượng Phê Duyệt</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="d : ${pr.details}">
                                <td class="text-start ps-3">
                                    <!-- FIX: d.medicine.medicineName (lazy Navigation còn tồn tại) -->
                                    <span th:text="${d.medicine != null ? d.medicine.medicineName : 'Thuốc ID: ' + d.medicineId}"></span>
                                    <!-- FIX: d.requestDetailId → d.purchaseRequestDetailId -->
                                    <input type="hidden" name="detailIds" th:value="${d.purchaseRequestDetailId}">
                                </td>
                                <!-- FIX: d.estimatedPrice → d.expectedUnitPrice (Integer, dùng formatInteger) -->
                                <td class="fw-bold"
                                    th:text="${#numbers.formatInteger(d.expectedUnitPrice, 1, 'COMMA')} + ' đ'"></td>
                                <!-- FIX: d.quantityRequested → d.requestedQuantity -->
                                <td th:text="${d.requestedQuantity}"></td>
                                <td>
                                    <!-- FIX: th:max dùng d.requestedQuantity -->
                                    <input type="number" name="approvedQuantities"
                                           th:value="${d.requestedQuantity}"
                                           class="form-control text-center"
                                           min="0" th:max="${d.requestedQuantity}" required>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold">Ghi chú phê duyệt</label>
                        <textarea name="adminNotes" class="form-control" rows="3"
                                  placeholder="Lý do hoặc hướng dẫn thêm..."></textarea>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-success">
                            <i class="fa-solid fa-check me-1"></i>Phê duyệt
                        </button>
                        <!-- FIX: pr.requestId → pr.purchaseRequestId -->
                        <button type="submit"
                                th:formaction="@{/purchase-requests/admin/reject/{id}(id=${pr.purchaseRequestId})}"
                                class="btn btn-danger">
                            <i class="fa-solid fa-xmark me-1"></i>Từ chối
                        </button>
                        <a href="/purchase-requests" class="btn btn-secondary">Quay lại</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
