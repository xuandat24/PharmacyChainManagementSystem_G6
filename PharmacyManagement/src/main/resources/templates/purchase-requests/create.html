<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Tạo Yêu cầu nhập hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        .sidebar { min-height: 100vh; background-color: #212529; }
        .sidebar a { color: #dee2e6; text-decoration: none; }
        .sidebar a:hover { background-color: #495057; color: white !important; }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <div th:replace="~{layout/sidebar :: sidebar('purchase')}"></div>
        <div class="col-md-10 bg-light p-4">
            <div class="pb-3 mb-4 border-bottom">
                <h2 class="text-secondary fw-bold">Tạo Yêu cầu nhập hàng Mới</h2>
            </div>
            <div class="card shadow-sm border-0 bg-white p-4">
                <form th:action="@{/purchase-requests/save}" th:object="${form}" method="post" id="prForm">
                    <div class="row mb-4">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Chọn Nhà Cung Cấp <span class="text-danger">*</span></label>
                            <select th:field="*{supplierId}" class="form-select" required>
                                <option value="">-- Chọn nhà cung cấp --</option>
                                <option th:each="s : ${suppliers}" th:value="${s.supplierId}"
                                        th:text="${s.supplierName}">Supplier</option>
                            </select>
                        </div>
                    </div>

                    <h5 class="fw-bold border-bottom pb-2 mb-3">Danh sách thuốc đề xuất nhập</h5>
                    <div class="table-responsive mb-4">
                        <table class="table table-bordered align-middle text-center" id="itemTable">
                            <thead class="table-light">
                            <tr>
                                <th style="width:45%">Tên Thuốc</th>
                                <th style="width:20%">Số Lượng Đề Xuất</th>
                                <th style="width:25%">Giá Đề Xuất (VNĐ)</th>
                                <th style="width:10%">Xóa</th>
                            </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                    <div class="mb-4">
                        <button type="button" class="btn btn-outline-primary" id="addRowBtn">
                            <i class="fa-solid fa-plus me-1"></i>Thêm thuốc
                        </button>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-success">
                            <i class="fa-solid fa-floppy-disk me-1"></i>Lưu Nháp
                        </button>
                        <a href="/purchase-requests" class="btn btn-secondary">Quay lại</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<div id="medicineOptions" style="display:none;">
    <option value="">-- Chọn thuốc --</option>
    <!-- FIX: m.unitPrice không tồn tại → dùng m.salePrice; m.strength có thể null -->
    <option th:each="m : ${medicines}"
            th:value="${m.medicineId}"
            th:data-price="${m.salePrice}"
            th:text="${m.medicineName} + (${m.strength != null} ? ' (' + ${m.strength} + ')' : '')">Medicine</option>
</div>

<script>
    let rowIndex = 0;
    const tbody = document.querySelector("#itemTable tbody");
    const medOptions = document.getElementById("medicineOptions").innerHTML;

    function addRow() {
        const row = document.createElement("tr");
        row.innerHTML = `
            <td>
                <select name="items[${rowIndex}].medicineId" class="form-select med-select" required onchange="updatePrice(this)">
                    ${medOptions}
                </select>
            </td>
            <td>
                <input type="number" name="items[${rowIndex}].quantityRequested"
                       class="form-control text-center" min="1" required placeholder="Số lượng">
            </td>
            <td>
                <!-- FIX: estimatedPrice là Integer → step="1", không dùng step="0.01" -->
                <input type="number" name="items[${rowIndex}].estimatedPrice"
                       class="form-control text-end est-price" step="1" min="0" required placeholder="Giá dự kiến">
            </td>
            <td>
                <button type="button" class="btn btn-danger btn-sm" onclick="removeRow(this)">
                    <i class="fa-solid fa-trash"></i>
                </button>
            </td>
        `;
        tbody.appendChild(row);
        rowIndex++;
    }

    function removeRow(btn) {
        btn.closest("tr").remove();
        reindex();
    }

    function reindex() {
        rowIndex = 0;
        tbody.querySelectorAll("tr").forEach(row => {
            row.querySelector("select").name = `items[${rowIndex}].medicineId`;
            row.querySelector("input[name*='quantityRequested']").name = `items[${rowIndex}].quantityRequested`;
            row.querySelector("input[name*='estimatedPrice']").name = `items[${rowIndex}].estimatedPrice`;
            rowIndex++;
        });
    }

    function updatePrice(select) {
        const price = select.options[select.selectedIndex].getAttribute("data-price");
        const priceInput = select.closest("tr").querySelector(".est-price");
        if (price) priceInput.value = price;
    }

    addRow();
    document.getElementById("addRowBtn").addEventListener("click", addRow);
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
