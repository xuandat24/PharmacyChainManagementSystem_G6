<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Yêu cầu nhập hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        .sidebar { min-height: 100vh; background-color: #212529; }
        .sidebar a { color: #dee2e6; text-decoration: none; }
        .sidebar a:hover { background-color: #495057; color: white !important; }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <div th:replace="~{layout/sidebar :: sidebar('purchase')}"></div>
        <div class="col-md-10 bg-light p-4">
            <div class="d-flex justify-content-between align-items-center pb-3 mb-4 border-bottom">
                <h2 class="text-secondary fw-bold">Quản lý Yêu cầu nhập hàng</h2>
                <div class="d-flex gap-2">
                    <div th:if="${user.role == 'BranchManager'}">
                        <a href="/purchase-requests/create" class="btn btn-success">
                            <i class="fa-solid fa-plus me-1"></i>Tạo yêu cầu mới
                        </a>
                    </div>
                    <div th:if="${user.role == 'Admin'}">
                        <a href="/goods-receipts/admin/pending" class="btn btn-outline-warning">
                            <i class="fa-solid fa-bell me-1"></i>Phiếu nhận chờ duyệt
                        </a>
                    </div>
                </div>
            </div>

            <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
                <span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
                <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="card shadow-sm border-0 bg-white">
                <div class="card-body p-0">
                    <table class="table table-hover align-middle mb-0 text-center">
                        <thead class="table-light">
                        <tr>
                            <th>Mã Yêu Cầu</th>
                            <th>Chi Nhánh</th>
                            <th>Ngày Đề Xuất</th>
                            <th>Nhà Cung Cấp</th>
                            <th>Tổng Dự Kiến</th>
                            <th>Trạng Thái</th>
                            <th>Hành Động</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="req : ${requests}">
                            <td class="fw-bold text-primary" th:text="'PR-' + ${req.purchaseRequestId}"></td>
                            <!-- FIX: open-in-view=true → branch lazy load OK trong template -->
                            <td th:text="${req.branch != null ? req.branch.branchName : 'CN-' + req.branchId}"></td>
                            <td th:text="${req.requestDate != null ? #temporals.format(req.requestDate,'dd/MM/yyyy HH:mm') : '-'}"></td>
                            <!-- FIX: supplier lazy load OK -->
                            <td th:text="${req.supplier != null ? req.supplier.supplierName : 'NCC-' + req.supplierId}"></td>
                            <td class="fw-semibold"
                                th:text="${#numbers.formatInteger((req.totalEstimatedAmount ?: 0),1,'COMMA')} + ' đ'">
                            </td>
                            <td>
                                <span th:if="${req.status == 'DRAFT'}" class="badge bg-secondary">Nháp</span>
                                <span th:if="${req.status == 'SUBMITTED'}" class="badge bg-warning text-dark">Chờ duyệt</span>
                                <span th:if="${req.status == 'APPROVED'}" class="badge bg-success">Đã duyệt</span>
                                <span th:if="${req.status == 'PARTIALLY_APPROVED'}" class="badge bg-info text-dark">Duyệt một phần</span>
                                <span th:if="${req.status == 'REJECTED'}" class="badge bg-danger">Bị từ chối</span>
                                <span th:if="${req.status == 'CANCELLED'}" class="badge bg-light text-dark border">Đã hủy</span>
                                <span th:if="${req.status == 'RECEIVING'}" class="badge bg-primary">Đang nhận</span>
                                <!-- FIX: COMPLETED badge phải hiển thị đúng màu -->
                                <span th:if="${req.status == 'COMPLETED'}" class="badge bg-success">Hoàn tất</span>
                            </td>
                            <td>
                                <!-- Branch Manager -->
                                <div th:if="${user.role == 'BranchManager'}" class="d-flex gap-1 justify-content-center flex-wrap">
                                    <a th:if="${req.status == 'DRAFT'}"
                                       th:href="@{/purchase-requests/submit/{id}(id=${req.purchaseRequestId})}"
                                       class="btn btn-sm btn-primary"
                                       onclick="return confirm('Gửi yêu cầu đi phê duyệt?')">
                                        <i class="fa-solid fa-paper-plane me-1"></i>Gửi duyệt
                                    </a>
                                    <a th:if="${req.status == 'DRAFT'}"
                                       th:href="@{/purchase-requests/cancel/{id}(id=${req.purchaseRequestId})}"
                                       class="btn btn-sm btn-outline-danger"
                                       onclick="return confirm('Hủy yêu cầu này?')">
                                        <i class="fa-solid fa-ban me-1"></i>Hủy
                                    </a>
                                    <a th:if="${req.status == 'APPROVED' or req.status == 'PARTIALLY_APPROVED'}"
                                       th:href="@{/goods-receipts/create(requestId=${req.purchaseRequestId})}"
                                       class="btn btn-sm btn-success">
                                        <i class="fa-solid fa-truck-ramp-box me-1"></i>Nhận hàng
                                    </a>
                                    <span th:if="${req.status == 'COMPLETED' or req.status == 'RECEIVING' or req.status == 'REJECTED' or req.status == 'CANCELLED' or req.status == 'SUBMITTED'}"
                                          class="text-muted small">—</span>
                                </div>

                                <!-- Admin -->
                                <div th:if="${user.role == 'Admin'}" class="d-flex gap-1 justify-content-center">
                                    <a th:if="${req.status == 'SUBMITTED'}"
                                       th:href="@{/purchase-requests/admin/approve/{id}(id=${req.purchaseRequestId})}"
                                       class="btn btn-sm btn-warning text-white">
                                        <i class="fa-solid fa-gavel me-1"></i>Xem & Duyệt
                                    </a>
                                    <form th:if="${req.status == 'SUBMITTED'}"
                                          th:action="@{/purchase-requests/admin/reject/{id}(id=${req.purchaseRequestId})}"
                                          method="post" class="d-inline">
                                        <button type="submit" class="btn btn-sm btn-outline-danger"
                                                onclick="return confirm('Từ chối yêu cầu này?')">
                                            <i class="fa-solid fa-xmark"></i>
                                        </button>
                                    </form>
                                    <span th:if="${req.status != 'SUBMITTED'}" class="text-muted small">—</span>
                                </div>

                                <!-- Pharmacist -->
                                <span th:if="${user.role == 'Pharmacist'}" class="text-muted small">Chỉ xem</span>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(requests)}">
                            <td colspan="7" class="text-muted py-4">Không có yêu cầu nhập hàng nào</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
