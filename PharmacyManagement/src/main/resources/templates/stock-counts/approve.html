<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Phê duyệt kiểm kê - Pharmacy Chain</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        .sidebar { min-height: 100vh; background-color: #212529; }
        .sidebar a { color: #dee2e6; text-decoration: none; }
        .sidebar a:hover { background-color: #495057; color: white !important; }
        .variance-row { background-color: #f8d7da !important; }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <div th:replace="~{layout/sidebar :: sidebar('stock')}"></div>

        <!-- Main Content -->
        <div class="col-md-10 bg-light p-4">
            <div class="pb-3 mb-4 border-bottom">
                <h2 class="text-secondary fw-bold">Duyệt chênh lệch kiểm kê lớn: <span th:text="'SC-' + ${count.stockCountId}">SC-001</span></h2>
                <!--
                    FIX: count.branch lazy navigation cần fallback an toàn.
                    FIX: count.createdBy là Integer (user_id), KHÔNG có .fullName
                -->
                <p class="text-muted">
                    Chi nhánh: <strong th:text="${count.branch != null ? count.branch.branchName : 'CN-' + count.branchId}">Branch A</strong>
                    | Người kiểm: <span th:text="'User #' + ${count.createdBy}">Nguyen Van An</span>
                </p>
                <p class="text-danger fw-bold">
                    Tổng giá trị chênh lệch: <span th:text="${#numbers.formatInteger(count.totalVarianceAmount, 1, 'COMMA')} + ' đ'"></span>
                </p>
            </div>

            <div class="card shadow-sm border-0 bg-white p-4">
                <form th:action="@{/stock-counts/admin/approve/{id}(id=${count.stockCountId})}" method="post">
                    <h5 class="fw-bold border-bottom pb-2 mb-3">Danh sách thuốc chênh lệch</h5>

                    <div class="table-responsive mb-4">
                        <table class="table table-bordered align-middle text-center">
                            <thead class="table-light">
                            <tr>
                                <th>Lô Hàng</th>
                                <th>Tồn Sổ Sách</th>
                                <th>Thực Tế Đếm</th>
                                <th>Chênh Lệch</th>
                                <th>Lý Do (Manager ghi)</th>
                            </tr>
                            </thead>
                            <tbody>
                            <!--
                                FIX toàn bộ field sai trong bản gốc:
                                - d.medicine.medicineName → StockCountDetail KHÔNG có field .medicine,
                                  chỉ có .inventoryBatch (lazy, theo inventory_batch_id). Hiển thị inventoryBatchId
                                  trực tiếp, hoặc join qua inventoryBatch.medicineId nếu lazy load được.
                                - d.batchNumber → KHÔNG tồn tại trong StockCountDetail entity.
                                  Dùng d.inventoryBatch.batchNumber (lazy navigation có sẵn) với fallback.
                            -->
                            <tr th:each="d : ${count.details}" th:classappend="${d.difference != 0} ? 'variance-row' : ''">
                                <td class="text-start ps-3">
                                    <span th:if="${d.inventoryBatch != null}"
                                          th:text="${d.inventoryBatch.batchNumber} + ' (MED-' + ${d.inventoryBatch.medicineId} + ')'">Medicine Name</span>
                                    <span th:unless="${d.inventoryBatch != null}"
                                          th:text="'Lô #' + ${d.inventoryBatchId}"></span>
                                </td>
                                <td th:text="${d.systemQuantity}">100</td>
                                <td th:text="${d.actualQuantity}" class="fw-bold text-primary">95</td>
                                <td th:text="${d.difference}" class="fw-bold text-danger"> -5</td>
                                <td class="text-start" th:text="${d.reason}">Hao hụt tự nhiên</td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(count.details)}">
                                <td colspan="5" class="text-muted py-4">Không có dòng chi tiết nào</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="mb-4">
                        <label for="adminNotes" class="form-label fw-bold">Ghi chú của Admin</label>
                        <textarea id="adminNotes" name="adminNotes" class="form-control" rows="3" placeholder="Nhập lý do phê duyệt/bác bỏ..." required></textarea>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-success"><i class="fa-solid fa-check me-1"></i>Duyệt & Cập nhật kho</button>
                        <button type="submit" th:formaction="@{/stock-counts/admin/reject/{id}(id=${count.stockCountId})}" class="btn btn-danger"><i class="fa-solid fa-xmark me-1"></i>Bác bỏ đợt kiểm kê</button>
                        <a href="/stock-counts" class="btn btn-secondary">Quay lại</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
