<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Kiểm kê chờ duyệt chênh lệch - Pharmacy Chain</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        .sidebar { min-height: 100vh; background-color: #212529; }
        .sidebar a { color: #dee2e6; text-decoration: none; }
        .sidebar a:hover { background-color: #495057; color: white !important; }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <div th:replace="~{layout/sidebar :: sidebar('stock')}"></div>

        <!-- Main Content -->
        <div class="col-md-10 bg-light p-4">
            <div class="pb-3 mb-4 border-bottom">
                <h2 class="text-secondary fw-bold">Kiểm kê chờ phê duyệt chênh lệch lớn</h2>
            </div>

            <div class="card shadow-sm border-0 bg-white">
                <div class="card-body p-0">
                    <table class="table table-hover align-middle mb-0 text-center">
                        <thead class="table-light">
                        <tr>
                            <th>Mã Kiểm Kê</th>
                            <th>Chi Nhánh</th>
                            <th>Ngày Kiểm Kê</th>
                            <th>Người Thực Hiện</th>
                            <th>Chênh Lệch (đ)</th>
                            <th>Hành Động</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="c : ${counts}">
                            <td class="fw-bold text-primary" th:text="'SC-' + ${c.stockCountId}">SC-001</td>
                            <!-- FIX: c.branch là lazy navigation, có thể null nếu chưa load -->
                            <td th:text="${c.branch != null ? c.branch.branchName : 'CN-' + c.branchId}">Branch A</td>
                            <td th:text="${c.countDate != null ? #temporals.format(c.countDate, 'dd-MM-yyyy HH:mm') : '-'}">23-06-2026 12:00</td>
                            <!-- FIX: c.createdBy là Integer (user_id), KHÔNG có .fullName -->
                            <td th:text="'User #' + ${c.createdBy}">Nguyen Van An</td>
                            <!-- Thêm cột chênh lệch để Admin biết giá trị trước khi bấm vào duyệt -->
                            <td class="text-danger fw-bold" th:text="${#numbers.formatInteger(c.totalVarianceAmount, 1, 'COMMA')} + ' đ'">600,000 đ</td>
                            <td>
                                <a th:href="@{/stock-counts/admin/approve/{id}(id=${c.stockCountId})}" class="btn btn-sm btn-warning text-white"><i class="fa-solid fa-gavel me-1"></i>Xem xét chênh lệch</a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(counts)}">
                            <td colspan="6" class="text-muted py-4">Không có phiếu kiểm kê chờ duyệt chênh lệch nào</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
