<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><title>Thanh toán tiền mặt</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-light" th:data-total="${sale.finalAmount}">
<div class="container py-4" style="max-width:520px">

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="card shadow border-0">
        <div class="card-header bg-success text-white">
            <h5 class="mb-0"><i class="fa-solid fa-money-bill-wave me-2"></i>Thanh toán Tiền mặt</h5>
        </div>
        <div class="card-body">
            <!-- Tóm tắt hóa đơn -->
            <div class="alert alert-light border mb-3">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <div class="fw-semibold" th:text="${sale.saleCode}"></div>
                        <small class="text-muted" th:if="${sale.customerName != null}"
                               th:text="${sale.customerName}"></small>
                    </div>
                    <strong class="text-success fs-4"
                            th:text="${#numbers.formatInteger(sale.finalAmount, 1, 'COMMA')} + ' đ'"></strong>
                </div>
            </div>

            <!-- Danh sách thuốc gọn -->
            <div class="mb-3 small text-muted">
                <div th:each="d : ${sale.details}"
                     class="d-flex justify-content-between border-bottom py-1">
                    <span th:text="${d.medicineName} + ' x' + ${d.quantity}"></span>
                    <span th:text="${#numbers.formatInteger(d.lineAmount, 1, 'COMMA')} + ' đ'"></span>
                </div>
            </div>

            <!-- Form nhập tiền -->
            <form th:action="@{/payments/cash}" method="post" th:object="${paymentDTO}">
                <input type="hidden" th:field="*{saleId}">

                <div class="mb-3">
                    <label class="form-label fw-semibold fs-5">Tiền khách đưa (đồng)</label>
                    <input type="number"
                           th:field="*{customerPaidAmount}"
                           id="amountInput"
                           class="form-control form-control-lg"
                           th:classappend="${#fields.hasErrors('customerPaidAmount')} ? 'is-invalid'"
                           th:min="${sale.finalAmount}"
                           required placeholder="0"
                           oninput="calcChange()">
                    <div th:if="${#fields.hasErrors('customerPaidAmount')}"
                         class="invalid-feedback" th:errors="*{customerPaidAmount}"></div>
                </div>

                <!-- Gợi ý mệnh giá -->
                <div class="mb-3">
                    <small class="text-muted">Gợi ý nhanh:</small><br>
                    <div class="d-flex flex-wrap gap-1 mt-1">
                        <button type="button" class="btn btn-outline-secondary btn-sm"
                                onclick="setAmount(50000)">50.000</button>
                        <button type="button" class="btn btn-outline-secondary btn-sm"
                                onclick="setAmount(100000)">100.000</button>
                        <button type="button" class="btn btn-outline-secondary btn-sm"
                                onclick="setAmount(200000)">200.000</button>
                        <button type="button" class="btn btn-outline-secondary btn-sm"
                                onclick="setAmount(500000)">500.000</button>
                        <button type="button" class="btn btn-outline-secondary btn-sm"
                                onclick="setAmount(1000000)">1.000.000</button>
                    </div>
                </div>

                <div class="alert alert-info d-flex justify-content-between align-items-center">
                    <span class="fw-semibold">Tiền thừa trả lại:</span>
                    <strong class="fs-4 text-primary" id="changeDisplay">0 đ</strong>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-success btn-lg">
                        <i class="fa-solid fa-check-circle me-2"></i>Xác nhận đã nhận tiền
                    </button>
                    <a th:href="@{/sales/cart}" class="btn btn-outline-secondary">Quay lại</a>
                </div>
            </form>
        </div>
    </div>
</div>
<script th:inline="none">

    const total = parseInt(document.body.dataset.total) || 0;
    function calcChange() {
        const recv = parseInt(document.getElementById('amountInput').value) || 0;
        const change = recv - total;
        const el = document.getElementById('changeDisplay');
        if (change >= 0) {
            el.innerHTML = change.toLocaleString('vi-VN') + ' đ';
            el.className = 'fs-4 text-primary';
        } else {
            el.innerHTML = 'Chưa đủ tiền (' + Math.abs(change).toLocaleString('vi-VN') + ' đ còn thiếu)';
            el.className = 'fs-4 text-danger';
        }
    }
    function setAmount(val) {
        document.getElementById('amountInput').value = val;
        calcChange();
    }
</script>
</body>
</html>
