<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chi nhánh</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <div th:replace="~{layout/sidebar :: sidebar('branches')}"></div>
        <div class="col-md-10 bg-light p-4">
            <div class="d-flex justify-content-between align-items-center pb-3 mb-4 border-bottom">
                <h2 class="text-secondary fw-bold"><span th:text="${{branch.branchId != null}} ? 'Sửa Chi nhánh' : 'Thêm Chi nhánh Mới'">Chi nhánh</span></h2>
                <div class="d-flex gap-2">
                </div>
            </div>
            <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
                <span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
                <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div class="row justify-content-center">
                <div class="col-md-8">
                    <div class="card shadow-sm border-0 bg-white">
                        <div class="card-body">
                            <div th:if="${error}" class="alert alert-danger fw-bold" th:text="${error}"></div>
                            <form th:action="@{/branches/save}" th:object="${branch}" method="post">

                                <input type="hidden" th:field="*{branchId}" />

                                <div class="row mb-3">
                                    <div class="col-md-4">
                                        <label class="form-label fw-bold">Mã chi nhánh <span class="text-danger">*</span></label>
                                        <input type="text" class="form-control" th:field="*{branchCode}" required placeholder="VD: CN01" />
                                    </div>
                                    <div class="col-md-8">
                                        <label class="form-label fw-bold">Tên chi nhánh <span class="text-danger">*</span></label>
                                        <input type="text" class="form-control" th:field="*{branchName}" required placeholder="VD: Nhà thuốc Long Châu CS1" />
                                    </div>
                                </div>

                                <div class="row mb-3">
                                    <div class="col-md-6">
                                        <label class="form-label fw-bold">Số điện thoại</label>
                                        <input type="text" class="form-control" th:field="*{phone}" placeholder="Nhập SĐT..." />
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label fw-bold">Trạng thái</label>
                                        <select class="form-select" th:field="*{status}">
                                            <option value="ACTIVE">Hoạt động (ACTIVE)</option>
                                            <option value="INACTIVE">Ngừng hoạt động (INACTIVE)</option>
                                        </select>
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-bold">Địa chỉ</label>
                                    <textarea class="form-control" th:field="*{address}" rows="2" placeholder="Nhập địa chỉ chi tiết..."></textarea>
                                </div>

                                <hr>
                                <div class="d-flex justify-content-end gap-2">
                                    <a th:href="@{/branches}" class="btn btn-secondary">Quay lại</a>
                                    <button type="submit" class="btn btn-success">Lưu dữ liệu</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
