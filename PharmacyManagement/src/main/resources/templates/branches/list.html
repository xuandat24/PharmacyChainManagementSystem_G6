<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Chi nhánh</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <div th:replace="~{layout/sidebar :: sidebar('branches')}"></div>
        <div class="col-md-10 bg-light p-4">
            <div class="d-flex justify-content-between align-items-center pb-3 mb-4 border-bottom">
                <h2 class="text-secondary fw-bold">Quản lý Chi nhánh</h2>
                <div class="d-flex gap-2">
                    <a th:href="@{/branches/new}" class="btn btn-success"><i class="fa-solid fa-plus me-1"></i>Thêm chi nhánh mới</a>
                </div>
            </div>
            <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
                <span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
                <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div class="card shadow-sm border-0 bg-white">
                <div class="card-body p-0">
                    <table class="table table-hover align-middle">
                        <thead class="table-dark text-center">
                        <tr>
                            <th class="text-center" style="width: 5%">ID</th>
                            <th style="width: 10%">Mã CN</th>
                            <th style="width: 25%">Tên Chi Nhánh</th>
                            <th style="width: 20%">Địa Chỉ</th>
                            <th style="width: 10%">SĐT</th>
                            <th class="text-center" style="width: 15%">Trạng Thái</th>
                            <th class="text-center" style="width: 15%">Thao tác</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="b : ${branches}">
                            <td class="text-center" th:text="${b.branchId}"></td>
                            <td class="fw-bold text-danger" th:text="${b.branchCode}"></td>
                            <td class="fw-bold text-primary" th:text="${b.branchName}"></td>
                            <td th:text="${b.address}"></td>
                            <td th:text="${b.phone}"></td>
                            <td class="text-center">
                                <span th:if="${b.status == 'ACTIVE'}" class="badge bg-success">Hoạt động</span>
                                <span th:if="${b.status == 'INACTIVE'}" class="badge bg-danger">Ngừng hoạt động</span>
                            </td>
                            <td class="text-center">
                                <a th:href="@{/branches/edit/{id}(id=${b.branchId})}" class="btn btn-sm btn-warning fw-bold">Sửa</a>
                                <a th:href="@{/branches/delete/{id}(id=${b.branchId})}" class="btn btn-sm btn-danger fw-bold"
                                   onclick="return confirm('Bạn có chắc chắn muốn ngứng hoạt động chi nhánh này?');">Xoá</a>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
