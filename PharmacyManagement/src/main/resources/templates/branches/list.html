<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Chi nhánh</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Danh sách Chi nhánh</h2>
        <a th:href="@{/branches/new}" class="btn btn-primary">+ Thêm chi nhánh mới</a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <table class="table table-bordered table-hover align-middle">
                <thead class="table-dark">
                <tr>
                    <th class="text-center" style="width: 5%">ID</th>
                    <th style="width: 10%">Mã CN</th>
                    <th style="width: 25%">Tên Chi Nhánh</th>
                    <th style="width: 20%">Địa Chỉ</th>
                    <th style="width: 10%">SĐT</th>
                    <th class="text-center" style="width: 15%">Trạng Thái</th>
                    <th class="text-center" style="width: 15%">Thao tác</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="b : ${branches}">
                    <td class="text-center" th:text="${b.branchId}"></td>
                    <td class="fw-bold text-danger" th:text="${b.branchCode}"></td>
                    <td class="fw-bold text-primary" th:text="${b.branchName}"></td>
                    <td th:text="${b.address}"></td>
                    <td th:text="${b.phone}"></td>
                    <td class="text-center">
                        <span th:if="${b.status == 'ACTIVE'}" class="badge bg-success">Hoạt động</span>
                        <span th:if="${b.status == 'INACTIVE'}" class="badge bg-danger">Ngừng hoạt động</span>
                    </td>
                    <td class="text-center">
                        <a th:href="@{/branches/edit/{id}(id=${b.branchId})}" class="btn btn-sm btn-warning fw-bold">Sửa</a>
                        <a th:href="@{/branches/delete/{id}(id=${b.branchId})}" class="btn btn-sm btn-danger fw-bold"
                           onclick="return confirm('Bạn có chắc chắn muốn ngứng hoạt động chi nhánh này?');">Xoá</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
