<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Phiếu chi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/flow4.css}" rel="stylesheet">
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <div th:replace="~{layout/sidebar :: sidebar('expenses')}"></div>
        <div class="col-md-10 bg-light p-3">
<section class="panel">
            <div class="panel-header">
                <h2>Danh sách phiếu chi</h2>
                <a class="btn btn-primary" th:href="@{/flow4/expenses/create}">+ Tạo phiếu chi</a>
            </div>
            <div class="toolbar">
                <div class="form-group" style="max-width: 220px;">
                    <label for="branchFilter">Chi nhánh</label>
                    <input type="number" id="branchFilter" min="1" placeholder="Để trống = tất cả">
                </div>
                <button class="btn btn-light" id="reloadExpensesBtn">Tải lại</button>
            </div>
            <div class="table-wrapper">
                <table>
                    <thead>
                    <tr>
                        <th>Mã phiếu</th>
                        <th>Chi nhánh</th>
                        <th>Loại chi</th>
                        <th>Số tiền</th>
                        <th>Ngày chi</th>
                        <th>Trạng thái</th>
                        <th>Thao tác</th>
                    </tr>
                    </thead>
                    <tbody id="expenseTableBody">
                    <tr><td colspan="7" class="empty-state">Đang tải dữ liệu...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>
        </div>
    </div>
</div>
<div th:replace="~{fragments :: toast}"></div>
<div th:replace="~{fragments :: confirmModal}"></div>
<script th:src="@{/js/flow4/common.js}"></script>
<script th:src="@{/js/flow4/expenses-list.js}"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
