<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh mục Thuốc</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <!-- FIX: trước dùng ~{fragments/navbar :: navbar} KHÔNG TỒN TẠI → crash 500 mỗi khi vào /medicines -->
        <div th:replace="~{layout/sidebar :: sidebar('medicines')}"></div>
        <div class="col-md-10 bg-light p-4">
            <div class="d-flex justify-content-between align-items-center pb-3 mb-4 border-bottom">
                <h2 class="text-secondary fw-bold">Danh mục Thuốc</h2>
                <a th:href="@{/medicines/new}" class="btn btn-success"
                   th:if="${session.loggedInUser != null and session.loggedInUser.role == 'Admin'}">
                    <i class="fa-solid fa-plus me-1"></i>Thêm thuốc mới
                </a>
            </div>

            <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
                <span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
                <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="card shadow-sm border-0 bg-white">
                <div class="card-body p-0">
                    <table class="table table-hover align-middle mb-0 text-center">
                        <thead class="table-light">
                        <tr>
                            <th>Mã Thuốc</th>
                            <th class="text-start ps-3">Tên Thuốc</th>
                            <th>Hoạt Chất</th>
                            <th>Đơn Vị</th>
                            <!-- FIX: cột giá dùng salePrice, không phải price -->
                            <th>Giá Bán</th>
                            <th>Kê Đơn</th>
                            <th>Trạng Thái</th>
                            <th>Thao Tác</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="med : ${medicines}">
                            <td class="fw-bold text-danger" th:text="${med.medicineCode}"></td>
                            <td class="text-start ps-3">
                                <div class="fw-bold" th:text="${med.medicineName}"></div>
                                <div class="text-muted small" th:if="${med.strength != null}"
                                     th:text="${med.strength} + (${med.dosageForm != null} ? ' · ' + ${med.dosageForm} : '')"></div>
                            </td>
                            <td class="text-muted small" th:text="${med.activeIngredient}"></td>
                            <td th:text="${med.unit}"></td>
                            <!-- FIX: med.price → med.salePrice (Medicine entity KHÔNG CÓ field price) -->
                            <td class="fw-bold text-success"
                                th:text="${#numbers.formatInteger(med.salePrice, 1, 'COMMA')} + ' đ'"></td>
                            <td>
                                <span th:if="${med.requiresPrescription}" class="badge bg-warning text-dark">Rx</span>
                                <span th:unless="${med.requiresPrescription}" class="badge bg-light text-dark border">OTC</span>
                            </td>
                            <td>
                                <span th:if="${med.status == 'ACTIVE'}" class="badge bg-success">Đang bán</span>
                                <span th:if="${med.status == 'INACTIVE'}" class="badge bg-danger">Ngừng bán</span>
                            </td>
                            <td>
                                <a th:href="@{/medicines/edit/{id}(id=${med.medicineId})}"
                                   class="btn btn-sm btn-outline-warning me-1"
                                   th:if="${session.loggedInUser != null and session.loggedInUser.role == 'Admin'}">
                                    <i class="fa-solid fa-pen-to-square"></i>
                                </a>
                                <a th:href="@{/medicines/delete/{id}(id=${med.medicineId})}"
                                   class="btn btn-sm btn-outline-danger"
                                   th:if="${session.loggedInUser != null and session.loggedInUser.role == 'Admin'}"
                                   onclick="return confirm('Ngừng bán thuốc này?')">
                                    <i class="fa-solid fa-ban"></i>
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(medicines)}">
                            <td colspan="8" class="text-muted py-4">Chưa có thuốc nào</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
