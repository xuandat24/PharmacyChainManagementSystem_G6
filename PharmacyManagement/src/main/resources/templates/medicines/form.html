<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thông tin Thuốc</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-10">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">Thông tin Thuốc</h4>
                </div>
                <div class="card-body">
                    <div th:if="${error}" class="alert alert-danger fw-bold" th:text="${error}"></div>
                    <div th:if="${success}" class="alert alert-success fw-bold" th:text="${success}"></div>

                    <form th:action="@{/medicines/save}" th:object="${medicine}" method="post">
                        <input type="hidden" th:field="*{medicineId}" />

                        <div class="row mb-3">
                            <div class="col-md-4">
                                <label class="form-label fw-bold">Mã thuốc <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" th:field="*{medicineCode}" required placeholder="VD: MED001" />
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-bold">Barcode</label>
                                <input type="text" class="form-control" th:field="*{barcode}" placeholder="893000000001" />
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-bold">Tên thuốc <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" th:field="*{medicineName}" required placeholder="VD: Panadol Extra" />
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Loại thuốc <span class="text-danger">*</span></label>
                                <select class="form-select" th:field="*{categoryId}" required>
                                    <option value="" disabled selected>-- Chọn loại --</option>
                                    <option th:each="cat : ${categories}"
                                            th:value="${cat.categoryId}"
                                            th:text="${cat.categoryName}"></option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Hoạt chất chính</label>
                                <input type="text" class="form-control" th:field="*{activeIngredient}" placeholder="VD: Paracetamol" />
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-4">
                                <label class="form-label fw-bold">Hàm lượng</label>
                                <input type="text" class="form-control" th:field="*{strength}" placeholder="VD: 500mg" />
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-bold">Dạng bào chế</label>
                                <input type="text" class="form-control" th:field="*{dosageForm}" placeholder="VD: Viên nén" />
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-bold">Đơn vị tính <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" th:field="*{unit}" required placeholder="VD: viên, hộp, ống" />
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Nhà sản xuất</label>
                                <input type="text" class="form-control" th:field="*{manufacturer}" placeholder="VD: GSK" />
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Nước sản xuất</label>
                                <input type="text" class="form-control" th:field="*{countryOfOrigin}" placeholder="VD: Việt Nam" />
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-4">
                                <!-- FIX: price (Double) → salePrice (Integer) khớp với Medicine entity -->
                                <label class="form-label fw-bold">Giá bán (VNĐ) <span class="text-danger">*</span></label>
                                <input type="number" class="form-control" th:field="*{salePrice}" required min="0" placeholder="VD: 5000" />
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-bold">Tồn kho tối thiểu</label>
                                <input type="number" class="form-control" th:field="*{minStockLevel}" min="0" placeholder="0" />
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-bold">Kê đơn</label>
                                <select class="form-select" th:field="*{requiresPrescription}">
                                    <option value="false">Không cần đơn</option>
                                    <option value="true">Cần kê đơn (Rx)</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Trạng thái</label>
                            <select class="form-select" th:field="*{status}">
                                <option value="ACTIVE">Đang bán (ACTIVE)</option>
                                <option value="INACTIVE">Ngừng bán (INACTIVE)</option>
                            </select>
                        </div>

                        <hr>
                        <div class="d-flex justify-content-end gap-2">
                            <a th:href="@{/medicines}" class="btn btn-secondary">Quay lại</a>
                            <button type="submit" class="btn btn-success">Lưu dữ liệu</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
