# ===============================
# APPLICATION
# ===============================
spring.application.name=pharmacy-chain-management
server.port=8080

# ===============================
# SQL SERVER DATABASE CONFIG
# ===============================
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=PharmacyChainDB;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=1234
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect

# Vì bạn đã có script SQL tự tạo bảng nên dùng none
spring.jpa.hibernate.ddl-auto=none

# Hiển thị SQL khi chạy để dễ debug
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Tránh lỗi lazy loading khi render Thymeleaf
spring.jpa.open-in-view=false

# ===============================
# THYMELEAF
# ===============================
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false

# ===============================
# STATIC RESOURCES
# ===============================
spring.web.resources.static-locations=classpath:/static/
spring.mvc.static-path-pattern=/**

# ===============================
# DATE / TIME FORMAT
# ===============================
spring.mvc.format.date=yyyy-MM-dd
spring.mvc.format.date-time=yyyy-MM-dd HH:mm:ss
spring.mvc.format.time=HH:mm:ss

# ===============================
# FILE UPLOAD
# ===============================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

# ===============================
# ERROR HANDLING
# ===============================
spring.web.error.whitelabel.enabled=false
spring.web.error.include-message=always
spring.web.error.include-binding-errors=always

# ===============================
# LOGGING
# ===============================
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# ===============================
# DEVTOOLS
# ===============================
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true
debug = true
spring.profiles.active=flow4-mock
