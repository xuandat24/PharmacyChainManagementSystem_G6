<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thông tin Chi nhánh</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">Nhập thông tin Chi nhánh</h4>
                </div>
                <div class="card-body">

                    <!-- ĐOẠN CODE HIỂN THỊ LỖI NẰM Ở ĐÂY -->
                    <div th:if="${error}" class="alert alert-danger fw-bold text-center" role="alert" th:text="${error}">
                    </div>

                    <form th:action="@{/branches/save}" th:object="${branch}" method="post">

                        <input type="hidden" th:field="*{branchId}" />

                        <div class="row mb-3">
                            <div class="col-md-4">
                                <label class="form-label fw-bold">Mã chi nhánh <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" th:field="*{branchCode}" required placeholder="VD: CN01" />
                            </div>
                            <div class="col-md-8">
                                <label class="form-label fw-bold">Tên chi nhánh <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" th:field="*{branchName}" required placeholder="VD: Nhà thuốc Long Châu CS1" />
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Số điện thoại</label>
                                <input type="text" class="form-control" th:field="*{phone}" placeholder="Nhập SĐT..." />
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Trạng thái</label>
                                <select class="form-select" th:field="*{status}">
                                    <option value="ACTIVE">Hoạt động (ACTIVE)</option>
                                    <option value="INACTIVE">Ngừng hoạt động (INACTIVE)</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Địa chỉ</label>
                            <textarea class="form-control" th:field="*{address}" rows="2" placeholder="Nhập địa chỉ chi tiết..."></textarea>
                        </div>

                        <hr>
                        <div class="d-flex justify-content-end gap-2">
                            <a th:href="@{/branches}" class="btn btn-secondary">Quay lại</a>
                            <button type="submit" class="btn btn-success">Lưu dữ liệu</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
