<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thông tin Thuốc</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">Nhập thông tin Thuốc</h4>
                </div>
                <div class="card-body">
                    <form th:action="@{/medicines/save}" th:object="${medicine}" method="post">

                        <input type="hidden" th:field="*{medicineId}" />

                        <div class="row mb-3">
                            <div class="col-md-4">
                                <label class="form-label fw-bold">Mã thuốc <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" th:field="*{medicineCode}" required placeholder="VD: T001" />
                            </div>
                            <div class="col-md-8">
                                <label class="form-label fw-bold">Tên thuốc <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" th:field="*{medicineName}" required placeholder="VD: Panadol Extra" />
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Nhóm Loại Thuốc <span class="text-danger">*</span></label>
                                <select class="form-select" th:field="*{categoryId}" required>
                                    <option value="" disabled selected>-- Chọn loại thuốc --</option>
                                    <option th:each="cat : ${categories}"
                                            th:value="${cat.categoryId}"
                                            th:text="${cat.categoryName}">
                                    </option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Trạng thái</label>
                                <select class="form-select" th:field="*{status}">
                                    <option value="ACTIVE">Đang bán</option>
                                    <option value="INACTIVE">Ngừng bán</option>
                                </select>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Đơn vị tính</label>
                                <input type="text" class="form-control" th:field="*{unit}" placeholder="VD: Hộp, Vỉ, Viên..." />
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Giá bán (VNĐ)</label>
                                <input type="number" step="0.01" class="form-control" th:field="*{price}" placeholder="VD: 50000" />
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Ghi chú / Mô tả</label>
                            <textarea class="form-control" th:field="*{description}" rows="2" placeholder="Cách dùng, chống chỉ định..."></textarea>
                        </div>

                        <hr>
                        <div class="d-flex justify-content-end gap-2">
                            <a th:href="@{/medicines}" class="btn btn-secondary">Quay lại</a>
                            <button type="submit" class="btn btn-success">Lưu dữ liệu</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
