<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Danh mục Thuốc</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Danh sách Thuốc</h2>
        <a th:href="@{/medicines/new}" class="btn btn-primary">+ Thêm thuốc mới</a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <table class="table table-bordered table-hover align-middle">
                <thead class="table-dark">
                <tr>
                    <th class="text-center" style="width: 5%">ID</th>
                    <th style="width: 15%">Mã Thuốc</th>
                    <th style="width: 20%">Tên Thuốc</th>
                    <th style="width: 10%">Đơn Vị</th>
                    <th style="width: 15%">Giá Bán</th>
                    <th class="text-center" style="width: 15%">Trạng Thái</th>
                    <th class="text-center" style="width: 20%">Thao tác</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="med : ${medicines}">
                    <td class="text-center" th:text="${med.medicineId}"></td>
                    <td class="fw-bold text-danger" th:text="${med.medicineCode}"></td>
                    <td class="fw-bold text-primary" th:text="${med.medicineName}"></td>
                    <td th:text="${med.unit}"></td>
                    <td th:text="${#numbers.formatDecimal(med.price, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"></td>
                    <td class="text-center">
                        <span th:if="${med.status == 'ACTIVE'}" class="badge bg-success">Đang bán</span>
                        <span th:if="${med.status == 'INACTIVE'}" class="badge bg-danger">Ngừng bán</span>
                    </td>

                    <td class="text-center">
                        <a th:href="@{/medicines/edit/{id}(id=${med.medicineId})}" class="btn btn-sm btn-warning fw-bold">Sửa</a>

                        <a th:href="@{/medicines/delete/{id}(id=${med.medicineId})}" class="btn btn-sm btn-danger fw-bold"
                           onclick="return confirm('Bạn có chắc chắn muốn ngừng bán loại thuốc này?');">Xóa</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
