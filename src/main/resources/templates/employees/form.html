<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thông tin Nhân viên</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">Nhập thông tin Nhân viên</h4>
                </div>
                <div class="card-body">
                    <form th:action="@{/employees/save}" th:object="${employee}" method="post">
                        <input type="hidden" th:field="*{employeeId}" />

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Họ và Tên <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" th:field="*{fullName}" required />
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Tài khoản (Username) <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" th:field="*{username}" required />
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Mật khẩu <span class="text-danger">*</span></label>
                            <input type="password" class="form-control" th:field="*{passwordHash}" required placeholder="Nhập mật khẩu..." />
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Phân quyền (Role) <span class="text-danger">*</span></label>
                                <select class="form-select" th:field="*{roleId}" required>
                                    <option value="" disabled selected>-- Chọn quyền --</option>
                                    <option th:each="r : ${roles}" th:value="${r.roleId}" th:text="${r.roleName}"></option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Chi nhánh làm việc <span class="text-danger">*</span></label>
                                <select class="form-select" th:field="*{branchId}" required>
                                    <option value="" disabled selected>-- Chọn chi nhánh --</option>
                                    <option th:each="b : ${branches}" th:value="${b.branchId}" th:text="${b.branchName}"></option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Trạng thái</label>
                            <select class="form-select" th:field="*{status}">
                                <option value="ACTIVE">Đang làm việc</option>
                                <option value="INACTIVE">Đã nghỉ việc</option>
                            </select>
                        </div>

                        <hr>
                        <div class="d-flex justify-content-end gap-2">
                            <a th:href="@{/employees}" class="btn btn-secondary">Quay lại</a>
                            <button type="submit" class="btn btn-success">Lưu dữ liệu</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
