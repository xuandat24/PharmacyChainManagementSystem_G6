<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Nhân sự</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Danh sách Nhân viên</h2>
        <a th:href="@{/employees/new}" class="btn btn-primary">+ Thêm nhân viên mới</a>
    </div>
    <div class="card shadow-sm">
        <div class="card-body">
            <table class="table table-bordered table-hover align-middle">
                <thead class="table-dark">
                <tr>
                    <th class="text-center">ID</th>
                    <th>Họ và Tên</th>
                    <th>Tài khoản</th>
                    <th>Quyền (Role ID)</th>
                    <th>Chi nhánh (Branch ID)</th>
                    <th class="text-center">Trạng thái</th>
                    <th class="text-center">Thao tác</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="emp : ${employees}">
                    <td class="text-center" th:text="${emp.employeeId}"></td>
                    <td class="fw-bold text-primary" th:text="${emp.fullName}"></td>
                    <td class="fw-bold text-danger" th:text="${emp.username}"></td>
                    <td th:text="${emp.roleId}"></td>
                    <td th:text="${emp.branchId}"></td>
                    <td class="text-center">
                        <span th:if="${emp.status == 'ACTIVE'}" class="badge bg-success">Đang làm việc</span>
                        <span th:if="${emp.status == 'INACTIVE'}" class="badge bg-danger">Đã nghỉ việc</span>
                    </td>
                    <td class="text-center">
                        <a th:if="${emp.username != 'admin'}"
                           th:href="@{/employees/edit/{id}(id=${emp.employeeId})}"
                           class="btn btn-sm btn-warning fw-bold">Sửa</a>

                        <a th:if="${emp.username != 'admin'}"
                           th:href="@{/employees/delete/{id}(id=${emp.employeeId})}"
                           class="btn btn-sm btn-danger fw-bold"
                           onclick="return confirm('Bạn có chắc chắn khóa tài khoản này?');">Khóa</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
