<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thông tin Cấu hình</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">Nhập thông tin Cấu hình</h4>
                </div>
                <div class="card-body">
                    <form th:action="@{/settings/save}" th:object="${setting}" method="post">
                        <input type="hidden" th:field="*{settingId}" />
                        <div class="mb-3">
                            <label class="form-label fw-bold">Khóa (Key) <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" th:field="*{settingKey}" required placeholder="VD: MIN_FREESHIP_ORDER" />
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Giá trị (Value) <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" th:field="*{settingValue}" required placeholder="VD: 500000" />
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Trạng thái</label>
                            <select class="form-select" th:field="*{status}">
                                <option value="ACTIVE">Hoạt động</option>
                                <option value="INACTIVE">Ngừng hoạt động</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Mô tả</label>
                            <textarea class="form-control" th:field="*{description}" rows="2"></textarea>
                        </div>
                        <hr>
                        <div class="d-flex justify-content-end gap-2">
                            <a th:href="@{/settings}" class="btn btn-secondary">Quay lại</a>
                            <button type="submit" class="btn btn-success">Lưu dữ liệu</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
