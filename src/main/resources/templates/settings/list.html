<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cấu hình Hệ thống</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Cấu hình Hệ thống</h2>
        <a th:href="@{/settings/new}" class="btn btn-primary">+ Thêm cấu hình mới</a>
    </div>
    <div class="card shadow-sm">
        <div class="card-body">
            <table class="table table-bordered table-hover align-middle">
                <thead class="table-dark">
                <tr>
                    <th class="text-center">ID</th>
                    <th>Khóa (Key)</th>
                    <th>Giá trị (Value)</th>
                    <th>Mô tả</th>
                    <th class="text-center">Trạng thái</th>
                    <th class="text-center">Thao tác</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="s : ${settings}">
                    <td class="text-center" th:text="${s.settingId}"></td>
                    <td class="fw-bold text-danger" th:text="${s.settingKey}"></td>
                    <td class="fw-bold text-primary" th:text="${s.settingValue}"></td>
                    <td th:text="${s.description}"></td>
                    <td class="text-center">
                        <span th:if="${s.status == 'ACTIVE'}" class="badge bg-success">Hoạt động</span>
                        <span th:if="${s.status == 'INACTIVE'}" class="badge bg-danger">Ngừng HĐ</span>
                    </td>
                    <td class="text-center">
                        <a th:href="@{/settings/edit/{id}(id=${s.settingId})}" class="btn btn-sm btn-warning fw-bold">Sửa</a>
                        <a th:href="@{/settings/delete/{id}(id=${s.settingId})}" class="btn btn-sm btn-danger fw-bold" onclick="return confirm('Xóa cấu hình này?');">Xóa</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
